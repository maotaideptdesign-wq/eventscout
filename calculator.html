<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>專業尺寸換算機 - EventScout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      darkMode: 'class', 
      theme: { 
        extend: { 
          fontFamily: { 
            sans: ['Inter', 'Noto Sans TC', 'sans-serif'], 
            mono: ['JetBrains Mono', 'monospace'] 
          } 
        } 
      } 
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    .digital-display { text-shadow: 0 0 10px rgba(52, 211, 153, 0.4); }
  </style>
</head>
<body class="bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 核心圖示元件區 ---
    function Icon({ name, className = "w-4 h-4" }) {
      const paths = {
        home: "m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10",
        box: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12",
        map: "M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3z M9 3v15 M15 6v15",
        fileText: "M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z M14 2v4a2 2 0 0 0 2 2h4 M10 9H8 M16 13H8 M16 17H8",
        book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z",
        settings: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z",
        sun: "M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41",
        moon: "M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z",
        menu: "M3 12h18M3 6h18M3 18h18",
        x: "M18 6L6 18M6 6l12 12",
        calculator: "M4 2h16a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z M8 6h8 M16 14h.01 M12 14h.01 M8 14h.01 M16 18h.01 M12 18h.01 M8 18h.01 M16 10h.01 M12 10h.01 M8 10h.01",
        monitor: "M2 3h20v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V3z M8 21h8 M12 17v4",
        projector: "M5 7h14a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z M9 12a2 2 0 1 0 0-4 2 2 0 0 0 0 4z M15 11h2 M15 13h2",
        users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75",
        printer: "M6 9V2h12v7 M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2 M6 14h12v8H6z",
        lightbulb: "M9 18h6 M10 22h4 M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .34 2.02 1.5 3.5.76.75 1.23 1.51 1.41 2.5"
      };
      return (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d={paths[name]} />
        </svg>
      );
    }

    // --- 共用導覽 Layout 元件 ---
    function AppLayout({ activePage, children, theme, toggleTheme }) {
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      return (
        <div className="flex h-screen bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
          <header className="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-4 flex items-center justify-between shrink-0 z-40 transition-colors duration-300">
            <button onClick={() => setIsSidebarOpen(true)} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              <Icon name="menu" className="w-6 h-6" />
            </button>
            <a href="index.html" className="font-bold text-slate-900 dark:text-white flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="w-5 h-5 rounded bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-3 h-3 text-white" /></div>
              EventScout
            </a>
            <button onClick={toggleTheme} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              {theme === 'light' ? <Icon name="moon" className="w-5 h-5" /> : <Icon name="sun" className="w-5 h-5" />}
            </button>
          </header>

          {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="lg:hidden fixed inset-0 bg-black/50 z-40 transition-opacity duration-300" />}

          <aside className={`fixed lg:relative inset-y-0 left-0 w-64 bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex flex-col flex-shrink-0 z-50 transition-transform duration-300 print:hidden lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 flex items-center justify-between">
              <a href="index.html" className="text-xl font-bold flex items-center gap-2 text-slate-900 dark:text-white hover:opacity-80 transition-opacity">
                <div className="w-6 h-6 rounded-md bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-4 h-4 text-white" /></div>
                EventScout
              </a>
              <button onClick={() => setIsSidebarOpen(false)} className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>
            
            <nav className="flex-1 px-3 space-y-1 mt-2 custom-scrollbar overflow-y-auto">
              <NavItem href="index.html" icon={<Icon name="home" />} label="首頁介紹" isActive={activePage === 'home'} />
              <NavItem href="knowledge.html" icon={<Icon name="book" />} label="場勘專業知識庫" isActive={activePage === 'knowledge'} />
              <div className="pt-4 pb-2 px-3 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">工作區工具</div>
              <NavItem href="calculator.html" icon={<Icon name="calculator" />} label="專業尺寸與空間換算" isActive={activePage === 'calculator'} />
              <NavItem href="truss.html" icon={<Icon name="box" />} label="Truss 架構圖" isActive={activePage === 'truss'} />
              <NavItem href="floorplan.html" icon={<Icon name="map" />} label="平面圖繪製" isActive={activePage === 'floorplan'} />
              <NavItem href="report.html" icon={<Icon name="fileText" />} label="場勘報告匯出" isActive={activePage === 'report'} />
            </nav>
            
            <div className="p-4 border-t border-slate-100 dark:border-slate-800/50">
              <button onClick={toggleTheme} className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] transition-colors">
                <span className="font-medium flex items-center gap-2">
                  {theme === 'light' ? <Icon name="moon" /> : <Icon name="sun" />}
                  {theme === 'light' ? '切換深色模式' : '切換淺色模式'}
                </span>
              </button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col relative pt-14 lg:pt-0 print:pt-0 print:w-full print:absolute print:inset-0 bg-[#F6F8F9] dark:bg-[#15151A] transition-colors duration-300">
            {children}
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, isActive, href }) {
      return (
        <a href={href} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm ${isActive ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 font-semibold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] hover:text-slate-900 dark:hover:text-slate-200 font-medium'}`}>
          {icon}<span>{label}</span>
        </a>
      );
    }

    function InputGroup({ label, value, onChange, suffix, step = "1" }) {
      return (
        <div>
          <div className="flex justify-between text-xs mb-1.5 font-bold text-slate-500 uppercase tracking-widest">
            <label>{label}</label>
            {suffix && <span className="text-indigo-600 dark:text-indigo-400">{suffix}</span>}
          </div>
          <input type="number" value={value} onChange={onChange} step={step} className="w-full bg-slate-50 dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2.5 font-bold text-base focus:ring-2 focus:ring-indigo-500 outline-none text-slate-900 dark:text-slate-100 transition-colors" />
        </div>
      );
    }

    // --- 各類計算機子元件 ---

    function LEDCalculator() {
      const [w, setW] = useState(8); const [h, setH] = useState(4); const [p, setP] = useState(2.5);
      const resW = Math.round((w * 1000) / p); const resH = Math.round((h * 1000) / p);
      
      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="bg-[#000] p-6 sm:p-8 rounded-2xl border-4 border-slate-800 text-emerald-400 font-mono shadow-inner">
            <div className="text-sm text-slate-400 font-bold mb-2 uppercase tracking-widest">Resolution (W x H)</div>
            <div className="text-4xl sm:text-5xl font-bold tracking-tight digital-display truncate">{resW} <span className="text-slate-600 text-3xl">x</span> {resH} <span className="text-xl">px</span></div>
            <div className="mt-4 pt-4 border-t border-emerald-900/40 flex justify-between text-sm text-emerald-500 font-medium">
              <span>總畫素: {((resW * resH) / 10000).toFixed(1)} 萬</span>
              <span>比例: {(resW / resH).toFixed(2)}:1</span>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <InputGroup label="螢幕寬度" value={w} onChange={e => setW(e.target.value)} step="0.5" suffix="m" />
            <InputGroup label="螢幕高度" value={h} onChange={e => setH(e.target.value)} step="0.5" suffix="m" />
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5">像素間距 (P數)</label>
            <select value={p} onChange={e => setP(Number(e.target.value))} className="w-full p-3 rounded-lg border bg-slate-50 dark:bg-[#15151A] border-slate-300 dark:border-slate-700 font-bold text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
              <option value="1.5">P1.5 (室內極細)</option>
              <option value="2.0">P2.0 (室內高階)</option>
              <option value="2.5">P2.5 (室內標準)</option>
              <option value="3.0">P3.0 (室內/戶外)</option>
              <option value="4.0">P4.0 (戶外標準)</option>
            </select>
          </div>

          <div className="bg-emerald-50 dark:bg-emerald-900/10 border-l-4 border-emerald-500 p-4 rounded-r-lg">
            <h4 className="flex items-center gap-2 text-sm font-bold text-emerald-800 dark:text-emerald-400 mb-1">
              <Icon name="lightbulb" className="w-4 h-4" /> 場勘與製稿提醒
            </h4>
            <p className="text-sm text-emerald-700 dark:text-emerald-500/80 leading-relaxed">
              單張發送卡負載約 65 萬像素。此尺寸約需配置 <strong>{Math.ceil((resW * resH) / 650000)}</strong> 條網路線訊號輸出。請提供準確的解析度給視覺設計師以防變形。
            </p>
          </div>
        </div>
      );
    }

    function ProjectionCalculator() {
      const [inch, setInch] = useState(150);
      const [ratio, setRatio] = useState('16:9');
      
      const diagMeters = (inch * 2.54) / 100;
      let wMeters = 0, hMeters = 0, recommendedPixel = "";
      if (ratio === '16:9') {
        wMeters = diagMeters * 0.8716; hMeters = diagMeters * 0.4903;
        recommendedPixel = inch >= 150 ? "3840 x 2160 (4K UHD)" : "1920 x 1080 (FHD)";
      } else {
        wMeters = diagMeters * 0.8; hMeters = diagMeters * 0.6;
        recommendedPixel = inch >= 150 ? "1600 x 1200 (UXGA)" : "1024 x 768 (XGA)";
      }

      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="bg-[#000] p-6 sm:p-8 rounded-2xl border-4 border-slate-800 text-cyan-400 font-mono shadow-inner">
            <div className="flex justify-between items-center mb-2">
              <span className="text-sm text-slate-400 font-bold uppercase tracking-widest">Physical Size</span>
              <span className="bg-cyan-900/40 text-cyan-300 px-2 py-1 rounded-md text-xs">{inch}" {ratio}</span>
            </div>
            <div className="text-4xl sm:text-5xl font-bold tracking-tight digital-display truncate my-1">
              {wMeters.toFixed(2)} <span className="text-slate-600 text-3xl">x</span> {hMeters.toFixed(2)} <span className="text-xl">m</span>
            </div>
            <div className="mt-4 pt-4 border-t border-cyan-900/40 grid grid-cols-3 text-center text-sm">
               <div><div className="text-slate-500 mb-1 font-bold">短焦</div><div className="font-bold">{(wMeters * 0.8).toFixed(1)}m</div></div>
               <div className="border-x border-cyan-900/40"><div className="text-slate-500 mb-1 font-bold">標準</div><div className="font-bold">{(wMeters * 1.5).toFixed(1)}m</div></div>
               <div><div className="text-slate-500 mb-1 font-bold">長焦</div><div className="font-bold">{(wMeters * 2.0).toFixed(1)}m</div></div>
            </div>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
             <InputGroup label="指定對角線尺寸" value={inch} onChange={e => setInch(Number(e.target.value))} step="10" suffix="inch" />
             <div>
                <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5 block">畫面比例</label>
                <div className="flex gap-2">
                   <button onClick={()=>setRatio('16:9')} className={`flex-1 p-2.5 rounded-lg text-sm font-bold border-2 transition ${ratio === '16:9' ? 'border-cyan-500 text-cyan-600 dark:text-cyan-400 bg-cyan-50 dark:bg-cyan-900/20' : 'border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-[#15151A]'}`}>16:9 (寬螢幕)</button>
                   <button onClick={()=>setRatio('4:3')} className={`flex-1 p-2.5 rounded-lg text-sm font-bold border-2 transition ${ratio === '4:3' ? 'border-cyan-500 text-cyan-600 dark:text-cyan-400 bg-cyan-50 dark:bg-cyan-900/20' : 'border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-[#15151A]'}`}>4:3 (傳統)</button>
                </div>
             </div>
          </div>

          <div className="bg-cyan-50 dark:bg-cyan-900/10 border-l-4 border-cyan-500 p-4 rounded-r-lg">
            <h4 className="flex items-center gap-2 text-sm font-bold text-cyan-800 dark:text-cyan-400 mb-1">
              <Icon name="lightbulb" className="w-4 h-4" /> 建議製稿像素與場勘注意
            </h4>
            <p className="text-sm text-cyan-700 dark:text-cyan-500/80 leading-relaxed">
              建議視覺設計師以 <strong>{recommendedPixel}</strong> 進行製稿。請現場確認深度（Throw Distance）是否足夠架設標準鏡頭，若不足請向硬體商改借「短焦鏡頭」。
            </p>
          </div>
        </div>
      )
    }

    function SpaceCalculator() {
      const [area, setArea] = useState(100);
      const [unit, setUnit] = useState('ping');
      const sqm = unit === 'ping' ? area * 3.305785 : area;
      const ping = unit === 'sqm' ? area * 0.3025 : area;

      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="bg-[#000] p-6 sm:p-8 rounded-2xl border-4 border-slate-800 text-amber-400 font-mono shadow-inner">
            <div className="flex justify-between items-center mb-4">
              <span className="text-sm text-slate-400 font-bold uppercase tracking-widest">CAPACITY</span>
              <span className="bg-amber-900/40 text-amber-300 px-2 py-1 rounded-md text-xs">{ping.toFixed(1)} 坪 / {sqm.toFixed(1)} m²</span>
            </div>
            <div className="grid grid-cols-2 gap-4">
               <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                 <div className="text-xs text-slate-500 font-sans mb-1">劇院型 (排椅)</div>
                 <div className="text-3xl sm:text-4xl font-bold digital-display">{Math.floor(sqm/1.2)} <span className="text-base text-amber-600 font-sans">人</span></div>
               </div>
               <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                 <div className="text-xs text-slate-500 font-sans mb-1">教室型 (含桌)</div>
                 <div className="text-3xl sm:text-4xl font-bold digital-display">{Math.floor(sqm/2.0)} <span className="text-base text-amber-600 font-sans">人</span></div>
               </div>
               <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                 <div className="text-xs text-slate-500 font-sans mb-1">宴會型 (10人/桌)</div>
                 <div className="text-3xl sm:text-4xl font-bold digital-display">{Math.floor(sqm/2.5)} <span className="text-base text-amber-600 font-sans">人</span></div>
               </div>
               <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                 <div className="text-xs text-slate-500 font-sans mb-1">純站立 (派對)</div>
                 <div className="text-3xl sm:text-4xl font-bold digital-display">{Math.floor(sqm/0.8)} <span className="text-base text-amber-600 font-sans">人</span></div>
               </div>
            </div>
          </div>
          
          <div>
            <div className="flex justify-between items-center mb-2">
              <label className="text-xs font-bold text-slate-500 uppercase tracking-widest">輸入總面積</label>
              <div className="flex bg-slate-100 dark:bg-[#15151A] rounded p-1">
                <button onClick={()=>{setUnit('ping'); setArea(Math.round(ping));}} className={`px-3 py-1.5 text-xs font-bold rounded transition ${unit==='ping'?'bg-white dark:bg-[#2A2B30] shadow text-amber-600 dark:text-amber-400':'text-slate-500'}`}>坪數</button>
                <button onClick={()=>{setUnit('sqm'); setArea(Math.round(sqm));}} className={`px-3 py-1.5 text-xs font-bold rounded transition ${unit==='sqm'?'bg-white dark:bg-[#2A2B30] shadow text-amber-600 dark:text-amber-400':'text-slate-500'}`}>m²</button>
              </div>
            </div>
            <input type="number" value={area} onChange={e=>setArea(Number(e.target.value))} className="w-full bg-slate-50 dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-3 text-lg font-bold focus:ring-2 focus:ring-indigo-500 outline-none text-slate-900 dark:text-slate-100 transition-colors" />
          </div>

          <div className="bg-amber-50 dark:bg-amber-900/10 border-l-4 border-amber-500 p-4 rounded-r-lg">
            <h4 className="flex items-center gap-2 text-sm font-bold text-amber-800 dark:text-amber-400 mb-1">
              <Icon name="lightbulb" className="w-4 h-4" /> 人數規劃提醒
            </h4>
            <p className="text-sm text-amber-700 dark:text-amber-500/80 leading-relaxed">
              此數值已預先扣除基礎走道與舞台折損。請務必現場確認是否有「不可移動的大型障礙物」或「粗大樑柱」，並視情況再下修 10% 以確保來賓有舒適的呼吸空間。
            </p>
          </div>
        </div>
      )
    }

    function PrintCalculator() {
      const [w, setW] = useState(300);
      const [h, setH] = useState(250);
      const [dpi, setDpi] = useState(150);

      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="bg-[#000] p-6 sm:p-8 rounded-2xl border-4 border-slate-800 text-rose-400 font-mono shadow-inner">
            <div className="flex justify-between items-center mb-2">
              <span className="text-sm text-slate-400 font-bold uppercase tracking-widest">PRINT RES. (Px)</span>
              <span className="bg-rose-900/40 text-rose-300 px-2 py-1 rounded-md text-xs">{dpi} DPI</span>
            </div>
            <div className="text-4xl sm:text-5xl font-bold tracking-tight digital-display truncate my-1">
              {Math.round((w/2.54)*dpi)} <span className="text-slate-600 text-3xl">x</span> {Math.round((h/2.54)*dpi)}
            </div>
            <div className="mt-4 text-sm text-rose-600 font-medium border-t border-rose-900/40 pt-3">
              實體尺寸: {w} x {h} cm
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
             <InputGroup label="寬度 (cm)" value={w} onChange={e=>setW(e.target.value)} suffix="cm" />
             <InputGroup label="高度 (cm)" value={h} onChange={e=>setH(e.target.value)} suffix="cm" />
          </div>

          <div>
             <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5 block">要求解析度 (DPI)</label>
             <select value={dpi} onChange={e=>setDpi(Number(e.target.value))} className="w-full p-3 rounded-lg border bg-slate-50 dark:bg-[#15151A] border-slate-300 dark:border-slate-700 font-bold text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
               <option value="72">72 dpi (遠距大型帆布)</option>
               <option value="150">150 dpi (一般展板/背板)</option>
               <option value="300">300 dpi (近距文宣/海報)</option>
             </select>
          </div>

          <div className="bg-rose-50 dark:bg-rose-900/10 border-l-4 border-rose-500 p-4 rounded-r-lg">
            <h4 className="flex items-center gap-2 text-sm font-bold text-rose-800 dark:text-rose-400 mb-1">
              <Icon name="lightbulb" className="w-4 h-4" /> 製稿與出血提醒
            </h4>
            <p className="text-sm text-rose-700 dark:text-rose-500/80 leading-relaxed">
              大圖輸出請確認色彩模式為 CMYK，並於製稿時在四周預留 <strong>+3cm 的包邊出血區域</strong>，避免現場施工與裁切時留下白邊或導致文字被截斷。
            </p>
          </div>
        </div>
      )
    }

    // --- 計算機主佈局（與其他網頁共用 AppLayout 框架） ---
    function CalculatorApp() {
      const [activeTool, setActiveTool] = useState('led');
      const tools = [
        { id: 'led', title: 'LED 螢幕', icon: 'monitor' },
        { id: 'projection', title: '投影布幕', icon: 'projector' },
        { id: 'space', title: '空間容量', icon: 'users' },
        { id: 'print', title: '大圖輸出', icon: 'printer' }
      ];

      return (
        <div className="h-full flex flex-col animate-in fade-in transition-colors">
          
          {/* Header */}
          <div className="px-6 sm:px-8 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#202024] flex justify-between items-center shrink-0">
            <h2 className="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
              <Icon name="calculator" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" />
              專業尺寸與空間換算機
            </h2>
          </div>

          {/* 行動版頂部分頁列 (僅在手機/平板顯示) */}
          <div className="lg:hidden bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-4 py-2 flex gap-1 shrink-0 overflow-x-auto custom-scrollbar">
            {tools.map(t => (
              <button 
                key={t.id} 
                onClick={() => setActiveTool(t.id)} 
                className={`flex-1 whitespace-nowrap py-2 px-3 rounded-md text-xs font-bold text-center border transition-all ${activeTool === t.id ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 border-indigo-200 dark:border-indigo-500/30' : 'border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30]'}`}
              >
                {t.title}
              </button>
            ))}
          </div>

          {/* 內容區塊 (雙欄 / 單欄自適應) */}
          <div className="flex flex-1 min-h-0 overflow-hidden">
            
            {/* 左側功能選單 (僅在桌機顯示，與 Truss 版面一致) */}
            <div className="hidden lg:flex w-[260px] bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex-col shrink-0 z-10">
               <div className="p-4 flex-1 overflow-y-auto custom-scrollbar space-y-2">
                 <div className="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3 px-1">選擇換算工具</div>
                 {tools.map(t => (
                   <button 
                     key={t.id} 
                     onClick={() => setActiveTool(t.id)} 
                     className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${
                       activeTool === t.id 
                         ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-500/30' 
                         : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] border border-transparent'
                     }`}
                   >
                     <Icon name={t.icon} className="w-5 h-5" />
                     {t.title}
                   </button>
                 ))}
               </div>
            </div>

            {/* 右側計算機主體呈現區 */}
            <div className="flex-1 bg-[#F6F8F9] dark:bg-[#15151A] overflow-y-auto custom-scrollbar p-4 sm:p-8">
               <div className="max-w-2xl mx-auto bg-white dark:bg-[#1E1E22] rounded-3xl shadow-sm border border-slate-200/80 dark:border-slate-800 p-6 sm:p-10">
                 {activeTool === 'led' && <LEDCalculator />}
                 {activeTool === 'projection' && <ProjectionCalculator />}
                 {activeTool === 'space' && <SpaceCalculator />}
                 {activeTool === 'print' && <PrintCalculator />}
               </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    function RootApp() {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      
      return (
        <AppLayout activePage="calculator" theme={theme} toggleTheme={toggleTheme}>
          <CalculatorApp />
        </AppLayout>
      );
    }
    root.render(<RootApp />);
  </script>
</body>
</html>
