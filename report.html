<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>場勘數據報告 - EventScout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'], } } } }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    @media print {
      .print\:hidden { display: none !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:w-full { width: 100% !important; }
      .print\:absolute { position: absolute !important; }
      .print\:inset-0 { inset: 0 !important; }
      .print-a4 { width: 210mm !important; min-height: 297mm !important; padding: 0 !important; box-shadow: none !important; }
    }
  </style>
</head>
<body class="bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function Icon({ name, className = "w-4 h-4" }) {
      const icons = {
        home: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
        box: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></svg>,
        map: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" /><line x1="9" y1="3" x2="9" y2="18" /><line x1="15" y1="6" x2="15" y2="21" /></svg>,
        fileText: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z" /><path d="M14 2v4a2 2 0 0 0 2 2h4" /><path d="M10 9H8" /><path d="M16 13H8" /><path d="M16 17H8" /></svg>,
        settings: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>,
        sun: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></svg>,
        moon: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z" /></svg>,
        menu: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></svg>,
        x: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
        printer: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect x="6" y="14" width="12" height="8" /></svg>
      };
      return icons[name] || null;
    }

    function AppLayout({ activePage, children }) {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');

      return (
        <div className="flex h-screen bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
          <header className="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-4 flex items-center justify-between shrink-0 z-20 print:hidden transition-colors duration-300">
            <button onClick={() => setIsSidebarOpen(true)} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              <Icon name="menu" className="w-6 h-6" />
            </button>
            <span className="font-bold text-slate-900 dark:text-white flex items-center gap-2">
              <div className="w-5 h-5 rounded bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-3 h-3 text-white" /></div>
              EventScout
            </span>
            <button onClick={toggleTheme} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              {theme === 'light' ? <Icon name="moon" className="w-5 h-5" /> : <Icon name="sun" className="w-5 h-5" />}
            </button>
          </header>

          {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="lg:hidden fixed inset-0 bg-black/50 z-30 transition-opacity duration-300" />}

          <aside className={`fixed lg:relative inset-y-0 left-0 w-64 bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex flex-col flex-shrink-0 z-40 transition-transform duration-300 print:hidden lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 flex items-center justify-between">
              <h1 className="text-xl font-bold flex items-center gap-2 text-slate-900 dark:text-white">
                <div className="w-6 h-6 rounded-md bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-4 h-4 text-white" /></div>
                EventScout
              </h1>
              <button onClick={() => setIsSidebarOpen(false)} className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>
            <nav className="flex-1 px-3 space-y-1 mt-2">
              <NavItem href="index.html" icon={<Icon name="home" />} label="首頁介紹" isActive={activePage === 'home'} />
              <div className="pt-4 pb-2 px-3 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">工作區</div>
              <NavItem href="truss.html" icon={<Icon name="box" />} label="Truss 架構圖" isActive={activePage === 'truss'} />
              <NavItem href="floorplan.html" icon={<Icon name="map" />} label="平面圖繪製" isActive={activePage === 'floorplan'} />
              <NavItem href="report.html" icon={<Icon name="fileText" />} label="場勘報告匯出" isActive={activePage === 'report'} />
            </nav>
            <div className="p-4 border-t border-slate-100 dark:border-slate-800/50">
              <button onClick={toggleTheme} className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] transition-colors">
                <span className="font-medium flex items-center gap-2">{theme === 'light' ? <Icon name="moon" /> : <Icon name="sun" />}{theme === 'light' ? '切換深色模式' : '切換淺色模式'}</span>
              </button>
              <div className="text-[10px] text-slate-400 dark:text-slate-600 text-center mt-4">&copy; 2026 Event Planner Tool</div>
            </div>
          </aside>

          <main className="flex-1 overflow-y-auto relative pt-14 lg:pt-0 print:pt-0 print:w-full print:absolute print:inset-0 bg-[#F6F8F9] dark:bg-[#15151A] transition-colors duration-300">
            {children}
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, isActive, href }) {
      return (
        <a href={href} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm ${isActive ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 font-semibold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] hover:text-slate-900 dark:hover:text-slate-200 font-medium'}`}>
          {icon}<span>{label}</span>
        </a>
      );
    }

    function InputGroup({ label, name, value, onChange, type = "text" }) {
      return (
        <div>
          <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1.5">{label}</label>
          <input type={type} name={name} value={value} onChange={onChange} className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-900 dark:text-slate-100 transition-colors" />
        </div>
      );
    }

    function TextAreaGroup({ label, name, value, onChange, rows = 2 }) {
      return (
        <div>
          <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1.5">{label}</label>
          <textarea name={name} value={value} onChange={onChange} rows={rows} className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none text-slate-900 dark:text-slate-100 transition-colors" />
        </div>
      );
    }

    function InfoRow({ label, value }) {
      return (
        <div className="flex border-b border-slate-200 pb-2">
          <span className="text-slate-500 w-20 font-medium shrink-0 text-xs sm:text-sm">{label}</span>
          <span className="text-slate-900 font-semibold text-xs sm:text-sm truncate">{value || '-'}</span>
        </div>
      );
    }

    function DetailItem({ label, value }) {
      return (
        <div className="flex flex-col gap-1.5">
          <span className="text-slate-500 font-bold text-[11px] uppercase tracking-wider">{label}</span>
          <span className="text-slate-900 font-medium whitespace-pre-wrap text-xs sm:text-sm">{value || '-'}</span>
        </div>
      );
    }

    function SectionBox({ title, children }) {
      return (
        <div className="border border-slate-300 rounded-lg overflow-hidden">
          <div className="px-4 py-2 bg-slate-100 border-b border-slate-300"><h3 className="font-bold text-slate-800 text-xs sm:text-sm">{title}</h3></div>
          <div className="p-4 sm:p-5">{children}</div>
        </div>
      );
    }

    function ReportApp() {
      const [report, setReport] = useState({
        projectName: '2026 年度品牌發表會', surveyDate: new Date().toISOString().split('T')[0], eventDate: '2026-06-15',
        venueName: '國際展覽中心 A館', venueAddress: '台北市信義區...', contactInfo: '王經理 0912-345-678',
        areaSize: '約 150 坪', ceilingHeight: '4.5 公尺', lowestPoint: '3.8 公尺 (空調管線/灑水頭)',
        loadingDock: '地下室 B1 卸貨區，限高 2.5m', elevatorSize: '門寬 1.2m / 內寬 2m x 深 3m x 高 2.5m',
        walkwayWidth: '走道最窄處 1.5m', power110V: '壁面四周共 8 組雙孔插座 (15A)',
        power220V_380V: '舞台左後方有 380V 動力電箱 (需配置專業技師接電)', network: '場地提供付費 Wi-Fi；4G/5G 收訊佳',
        lighting: '基本堪用，為黃光 (3000K) 軌道燈', floorMaterial: '大理石地磚 (全區施工需鋪設保護板)',
        wallMaterial: '漆面牆 (嚴禁使用雙面膠，僅可使用無痕膠帶)', timeRestriction: '進場: 22:00 後 / 撤場: 12:00 前',
        fireSafety: '滅火器 4 支，逃生門 2 處 (周邊嚴禁堆放雜物)', otherNotes: '1. 施工人員需配戴工作證、著反光背心。\n2. 場內全面禁菸飲食。'
      });

      const handleChange = (e) => setReport(prev => ({ ...prev, [e.target.name]: e.target.value }));

      return (
        <div className="h-full flex flex-col animate-in fade-in print:p-0 transition-colors">
          <div className="px-6 sm:px-8 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#202024] flex flex-col sm:flex-row justify-between sm:items-center gap-3 shrink-0 print:hidden text-slate-900 dark:text-white">
            <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="fileText" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" /> 場勘數據報告匯出</h2>
            <button onClick={() => window.print()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium flex items-center justify-center gap-2 shadow-sm transition-colors text-sm">
              <Icon name="printer" /> 列印 / 存為 PDF
            </button>
          </div>

          <div className="flex flex-col lg:flex-row flex-1 min-h-0 print:block">
            <div className="w-full lg:w-[40%] bg-white dark:bg-[#202024] border-b lg:border-b-0 lg:border-r border-slate-200 dark:border-slate-800 overflow-y-auto print:hidden custom-scrollbar shrink-0">
              <div className="p-6 space-y-8">
                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">1. 基本資訊</h4>
                  <InputGroup label="專案/活動名稱" name="projectName" value={report.projectName} onChange={handleChange} />
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4"><InputGroup label="場勘日期" name="surveyDate" type="date" value={report.surveyDate} onChange={handleChange} /><InputGroup label="預定活動日期" name="eventDate" type="date" value={report.eventDate} onChange={handleChange} /></div>
                  <InputGroup label="場地名稱" name="venueName" value={report.venueName} onChange={handleChange} />
                  <InputGroup label="場地地址" name="venueAddress" value={report.venueAddress} onChange={handleChange} />
                  <InputGroup label="場地聯絡人/電話" name="contactInfo" value={report.contactInfo} onChange={handleChange} />
                </div>
                <div className="h-px bg-slate-200 dark:bg-slate-700/50"></div>
                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">2. 空間與進撤場動線</h4>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4"><InputGroup label="預估面積/坪數" name="areaSize" value={report.areaSize} onChange={handleChange} /><InputGroup label="天花板淨高" name="ceilingHeight" value={report.ceilingHeight} onChange={handleChange} /></div>
                  <InputGroup label="最低障礙物高度" name="lowestPoint" value={report.lowestPoint} onChange={handleChange} />
                  <TextAreaGroup label="卸貨區位置與限高" name="loadingDock" value={report.loadingDock} onChange={handleChange} />
                  <TextAreaGroup label="進場電梯尺寸" name="elevatorSize" value={report.elevatorSize} onChange={handleChange} />
                  <InputGroup label="動線最窄處寬度" name="walkwayWidth" value={report.walkwayWidth} onChange={handleChange} />
                </div>
                <div className="h-px bg-slate-200 dark:bg-slate-700/50"></div>
                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">3. 機電與網路設備</h4>
                  <TextAreaGroup label="一般插座 (110V)" name="power110V" value={report.power110V} onChange={handleChange} />
                  <TextAreaGroup label="動力電箱 (220V/380V)" name="power220V_380V" value={report.power220V_380V} onChange={handleChange} />
                  <InputGroup label="場地燈光狀況" name="lighting" value={report.lighting} onChange={handleChange} />
                  <InputGroup label="網路/收訊狀況" name="network" value={report.network} onChange={handleChange} />
                </div>
                <div className="h-px bg-slate-200 dark:bg-slate-700/50"></div>
                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">4. 場地規範與安全</h4>
                  <InputGroup label="地板材質 (保護板規範)" name="floorMaterial" value={report.floorMaterial} onChange={handleChange} />
                  <InputGroup label="牆面材質 (黏貼規範)" name="wallMaterial" value={report.wallMaterial} onChange={handleChange} />
                  <InputGroup label="進撤場時間限制" name="timeRestriction" value={report.timeRestriction} onChange={handleChange} />
                  <InputGroup label="消防設施位置" name="fireSafety" value={report.fireSafety} onChange={handleChange} />
                  <TextAreaGroup label="補充備註事項" name="otherNotes" value={report.otherNotes} onChange={handleChange} rows={3} />
                </div>
              </div>
            </div>

            <div className="flex-1 bg-slate-200/50 dark:bg-[#15151A] overflow-y-auto flex justify-center p-4 sm:p-8 print:p-0 print:bg-white print:overflow-visible">
              <div className="bg-white w-full max-w-3xl lg:w-[210mm] min-h-[297mm] shadow-lg print:shadow-none p-6 sm:p-12 print:p-0 text-slate-900 mx-auto font-sans print-a4">
                <div className="border-b-2 border-slate-900 pb-4 mb-6 sm:mb-8 flex flex-col sm:flex-row justify-between sm:items-end gap-2">
                  <div><h1 className="text-xl sm:text-2xl font-bold text-slate-900 mb-1 leading-tight">{report.projectName}</h1><h2 className="text-base sm:text-lg font-semibold text-slate-500 tracking-wide">場地勘查檢核報告</h2></div>
                  <div className="text-left sm:text-right text-xs text-slate-500 shrink-0"><p>勘查日期：{report.surveyDate}</p><p>列印日期：{new Date().toLocaleDateString()}</p></div>
                </div>

                <div className="mb-6 sm:mb-8 p-4 sm:p-5 bg-slate-50 border border-slate-200 rounded-md">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4 text-sm">
                    <InfoRow label="活動日期" value={report.eventDate} /><InfoRow label="場地聯絡" value={report.contactInfo} />
                    <InfoRow label="場地名稱" value={report.venueName} />
                    <div className="sm:col-span-2"><InfoRow label="場地地址" value={report.venueAddress} /></div>
                  </div>
                </div>

                <div className="grid grid-cols-1 gap-6">
                  <SectionBox title="空間與進撤場動線">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-5 text-sm">
                      <DetailItem label="預估面積" value={report.areaSize} /><DetailItem label="天花板淨高" value={report.ceilingHeight} />
                      <DetailItem label="最低障礙物" value={report.lowestPoint} /><DetailItem label="動線最窄處" value={report.walkwayWidth} />
                      <div className="sm:col-span-2"><DetailItem label="卸貨區資訊" value={report.loadingDock} /></div>
                      <div className="sm:col-span-2"><DetailItem label="電梯尺寸限制" value={report.elevatorSize} /></div>
                    </div>
                  </SectionBox>

                  <SectionBox title="機電、網路與視聽">
                    <div className="space-y-5 text-sm">
                      <DetailItem label="一般插座 (110V)" value={report.power110V} />
                      <DetailItem label="動力電箱 (220/380V)" value={report.power220V_380V} />
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-8"><DetailItem label="現場燈光" value={report.lighting} /><DetailItem label="網路狀況" value={report.network} /></div>
                    </div>
                  </SectionBox>

                  <SectionBox title="場地規範與安全防護">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-5 text-sm">
                      <DetailItem label="地板防護" value={report.floorMaterial} /><DetailItem label="牆面黏貼" value={report.wallMaterial} />
                      <div className="sm:col-span-2"><DetailItem label="進撤場時間限制" value={report.timeRestriction} /></div>
                      <div className="sm:col-span-2"><DetailItem label="消防與逃生設施" value={report.fireSafety} /></div>
                    </div>
                  </SectionBox>

                  <div className="mt-2">
                    <h3 className="text-sm font-bold text-slate-800 mb-2 border-l-2 border-slate-400 pl-2">補充備註事項</h3>
                    <div className="text-sm text-slate-700 whitespace-pre-wrap pl-3 leading-relaxed">{report.otherNotes || '無'}</div>
                  </div>
                </div>

                <div className="mt-12 sm:mt-16 pt-8 flex justify-end gap-10 sm:gap-20 text-sm text-slate-600">
                  <div className="text-center"><div className="w-24 sm:w-32 border-b border-slate-400 mb-2 h-8"></div><p>場勘人員簽名</p></div>
                  <div className="text-center"><div className="w-24 sm:w-32 border-b border-slate-400 mb-2 h-8"></div><p>場地方確認</p></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppLayout activePage="report"><ReportApp /></AppLayout>);
  </script>
</body>
</html>
