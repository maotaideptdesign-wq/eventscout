    // --- 平面圖繪製系統 ---

    const GRID_SIZE = 20;

    const colorThemes = {
      "#fef08a": { stroke: "#eab308", darkStroke: "#ca8a04", label: "黃色" },
      "#fecaca": { stroke: "#ef4444", darkStroke: "#dc2626", label: "紅色" },

    const componentSpecs = {

    function FloorPlanApp({ theme }) {
      const isDark = theme === 'dark';
      const svgRef = useRef(null);

      // UI 與畫布設定狀態
      const [canvasSize, setCanvasSize] = useState({ w: 1920, h: 1080 });
      const [scale, setScale] = useState(1);
      
      const [leftTab, setLeftTab] = useState('library'); 
      const [mobileSubTab, setMobileSubTab] = useState('canvas'); 
      const [toastMsg, setToastMsg] = useState('');

      // 畫布資料狀態
      const [zones, setZones] = useState([
        { id: 'zone_1', name: '主舞台預設', shape: 'rect', gridW: 12, gridH: 6, color: '#fef08a', noFill: false, offsetX: 0, offsetY: 0, rotation: 0, points: [{x: 840, y: 300}] },
        { id: 'zone_2', name: '控台預設', shape: 'rect', gridW: 6, gridH: 4, color: '#dbeafe', noFill: false, offsetX: 0, offsetY: 0, rotation: 0, points: [{x: 900, y: 600}] }
      ]);
      const [selectedId, setSelectedId] = useState(null);
      
      // 繪圖與操作狀態
      const [isDrawing, setIsDrawing] = useState(false);
      const [drawMode, setDrawMode] = useState(null); 
      const [draftPoints, setDraftPoints] = useState([]);
      const [mousePos, setMousePos] = useState({x: 0, y: 0});
      const [draggingCompType, setDraggingCompType] = useState(null);

      // 拖曳暫存 Ref
      const dragRef = useRef({ type: null, id: null, pointIdx: null, startX: 0, startY: 0, initialZones: [] });

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 2500);
      };

      const getCentroid = (pts) => {
        if(!pts || !pts.length) return { x: 0, y: 0 };
        const sum = pts.reduce((acc, p) => ({ x: acc.x + p.x, y: acc.y + p.y }), { x: 0, y: 0 });
        return { x: sum.x / pts.length, y: sum.y / pts.length };
      };

      const getSvgPoint = (e) => {
        if (!svgRef.current) return { x: 0, y: 0 };
        const svg = svgRef.current;
        const pt = svg.createSVGPoint();
        
        if (e.touches && e.touches.length > 0) {
          pt.x = e.touches[0].clientX;
          pt.y = e.touches[0].clientY;
        } else {
          pt.x = e.clientX;
          pt.y = e.clientY;
        }

        const transformed = pt.matrixTransform(svg.getScreenCTM().inverse());
        return {
          x: Math.max(0, Math.min(canvasSize.w, Math.round(transformed.x))),
          y: Math.max(0, Math.min(canvasSize.h, Math.round(transformed.y)))
        };
      };

      // --- Pointer 事件處理 ---
      
      const handleSvgPointerDown = (e) => {
        if (e.target.tagName === 'svg' || (e.target.tagName === 'rect' && (e.target.getAttribute('fill') === 'url(#gridPattern)' || e.target.getAttribute('fill') === 'transparent' || e.target.getAttribute('data-bg') === 'true'))) {
          setSelectedId(null);
          
          const pt = getSvgPoint(e);

          if (draggingCompType) {
            const spec = componentSpecs[draggingCompType];
            const newId = `zone_${Date.now()}`;
            const newZone = {
              id: newId, name: spec.name, shape: spec.shape, gridW: spec.w, gridH: spec.h,
              color: "#dbeafe", noFill: false, offsetX: 0, offsetY: 0, rotation: 0,
              points: spec.shape === 'circle' ? [pt] : [pt, { x: pt.x + spec.w * GRID_SIZE, y: pt.y + spec.h * GRID_SIZE }]
            };
            setZones([...zones, newZone]);
            setSelectedId(newId);
            setDraggingCompType(null);
            showToast(`已放置 ${spec.name}`);
            return;
          }

          if (isDrawing) {
            if (draftPoints.length > 2 && drawMode === 'polygon') {
              const firstPt = draftPoints[0];
              const dist = Math.hypot(pt.x - firstPt.x, pt.y - firstPt.y);
              if (dist < 20) {
                finishDrawing();
                return;
              }
            }
            const newDraft = [...draftPoints, pt];
            setDraftPoints(newDraft);
            
            if (drawMode === 'rect' && newDraft.length === 2) finishDrawing(newDraft);
            if (drawMode === 'circle' && newDraft.length === 2) finishDrawing(newDraft);
          }
        }
      };

      const handlePointerDown = (e, type, id, pointIdx = null) => {
        if (isDrawing) return;
        e.stopPropagation();
        
        setSelectedId(id);

        const pt = getSvgPoint(e);
        dragRef.current = {
          type, id, pointIdx,
          startX: pt.x, startY: pt.y,
          initialZones: JSON.parse(JSON.stringify(zones))
        };
      };

      const handlePointerMove = (e) => {
        const pt = getSvgPoint(e);
        setMousePos(pt);

        if (!dragRef.current.type) return;

        const { type, id, pointIdx, startX, startY, initialZones } = dragRef.current;
        const dx = pt.x - startX;
        const dy = pt.y - startY;

        setZones(prev => prev.map(z => {
          if (z.id !== id) return z;
          const origZ = initialZones.find(oz => oz.id === id);
          if (!origZ) return z;

          if (type === 'zone') {
            return { ...z, offsetX: (origZ.offsetX || 0) + dx, offsetY: (origZ.offsetY || 0) + dy };
          } else if (type === 'handle') {
            const newPoints = [...origZ.points];
            newPoints[pointIdx] = { x: origZ.points[pointIdx].x + dx, y: origZ.points[pointIdx].y + dy };
            return { ...z, points: newPoints };
          }
          return z;
        }));
      };

      const handlePointerUp = (e) => {
        dragRef.current = { type: null, id: null, pointIdx: null, startX: 0, startY: 0, initialZones: [] };
      };

      const handleDoubleClick = () => {
        if (isDrawing && drawMode === 'polygon' && draftPoints.length >= 3) {
          finishDrawing();
        }
      };

      const startDrawMode = (mode, msg) => {
        setIsDrawing(true);
        setDrawMode(mode);
        setDraftPoints([]);
        setSelectedId(null);
        setDraggingCompType(null);
        showToast(msg);
        setMobileSubTab('canvas');
      };

      const finishDrawing = (pts = draftPoints) => {
        if (pts.length < 2) return;
        const newId = `draw_${Date.now()}`;
        const newZone = {
          id: newId, 
          name: drawMode === 'polygon' ? `自訂多邊形` : drawMode === 'rect' ? `自訂矩形` : `自訂圓形`,
          shape: drawMode, color: "#fef08a", noFill: false, offsetX: 0, offsetY: 0, rotation: 0,
          points: pts
        };

        if (drawMode === 'rect') {
          newZone.points = [{ x: Math.min(pts[0].x, pts[1].x), y: Math.min(pts[0].y, pts[1].y) }];
          newZone.gridW = Math.max(1, Math.round(Math.abs(pts[1].x - pts[0].x) / GRID_SIZE));
          newZone.gridH = Math.max(1, Math.round(Math.abs(pts[1].y - pts[0].y) / GRID_SIZE));
        } else if (drawMode === 'circle') {
          newZone.points = [pts[0]];
          const rPx = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
          const cells = Math.max(1, Math.round((rPx * 2) / GRID_SIZE));
          newZone.gridW = cells; newZone.gridH = cells;
        }

        setZones([...zones, newZone]);
        setSelectedId(newId);
        cancelDrawing();
      };

      const cancelDrawing = () => { setIsDrawing(false); setDrawMode(null); setDraftPoints([]); };

      const updateSelectedZone = (updates) => {
        if (!selectedId) return;
        setZones(zones.map(z => z.id === selectedId ? { ...z, ...updates } : z));
      };

      const deleteZone = (id) => {
        setZones(zones.filter(z => z.id !== id));
        if (selectedId === id) setSelectedId(null);
        showToast("元件已刪除");
      };

      const duplicateZone = () => {
        if (!selectedId) return;
        const target = zones.find(z => z.id === selectedId);
        if (target) {
          const newId = `zone_${Date.now()}`;
          setZones([...zones, { ...target, id: newId, name: `${target.name} (複製)`, offsetX: target.offsetX + 40, offsetY: target.offsetY + 40 }]);
          setSelectedId(newId);
          showToast("元件複製成功");
        }
      };

      // 層級調整控制核心邏輯
      const reorderZone = (action) => {
        if (!selectedId) return;
        const idx = zones.findIndex(z => z.id === selectedId);
        if (idx === -1) return;
        const newZones = [...zones];
        const [target] = newZones.splice(idx, 1);

        if (action === 'top') newZones.push(target);
        else if (action === 'bottom') newZones.unshift(target);
        else if (action === 'up' && idx < zones.length - 1) newZones.splice(idx + 1, 0, target);
        else if (action === 'down' && idx > 0) newZones.splice(idx - 1, 0, target);
        else return;

        setZones(newZones);
        showToast(`層級已調整`);
      };

      const exportImage = (type) => {
        const svg = svgRef.current;
        if (!svg) return;
        
        const svgString = new XMLSerializer().serializeToString(svg);
        let modifiedSvgStr = svgString;
        
        if (!modifiedSvgStr.includes('xmlns=')) {
          modifiedSvgStr = modifiedSvgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
        }
        
        const blob = new Blob([modifiedSvgStr], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        
        if (type === 'svg') {
          const link = document.createElement("a");
          link.href = url;
          link.download = `平面圖_${canvasSize.w}x${canvasSize.h}_${Date.now()}.svg`;
          link.click();
          showToast("SVG 匯出成功");
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } else {
          showToast("高清 PNG 產生中...");
          const img = new Image();
          img.onload = () => {
            const cvs = document.createElement('canvas');
            cvs.width = canvasSize.w; 
            cvs.height = canvasSize.h;
            const ctx = cvs.getContext('2d');
            
            ctx.fillStyle = isDark ? '#09090b' : '#ffffff';
            ctx.fillRect(0, 0, canvasSize.w, canvasSize.h);
            ctx.drawImage(img, 0, 0);
            
            const link = document.createElement("a");
            link.href = cvs.toDataURL('image/png', 1.0);
            link.download = `平面圖_${canvasSize.w}x${canvasSize.h}_${Date.now()}.png`;
            link.click();
            URL.revokeObjectURL(url);
          };
          img.src = url;
        }
      };

      const selectedZone = zones.find(z => z.id === selectedId);

      return (
        <div className="h-full flex flex-col animate-in fade-in transition-colors w-full overflow-hidden">
          
          {/* Header */}
          <div className="px-6 py-4 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#202024] flex justify-between items-center shrink-0 z-20">
            <h2 className="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
              <Icon name="map" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" /> 平面圖繪製與編輯
            </h2>
            <div className="flex gap-2">
              <button onClick={() => { if(confirm("確定重設清空畫布嗎？")) { setZones([]); setSelectedId(null); cancelDrawing(); setScale(1); } }} className="px-3 py-1.5 text-xs font-bold bg-slate-100 dark:bg-[#2A2B30] text-slate-600 dark:text-slate-400 rounded-lg hover:bg-slate-200 transition hidden sm:flex items-center gap-1.5"><Icon name="refresh" />重設</button>
              
              <div className="relative group">
                <button className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-sm transition"><Icon name="download" /> 匯出圖面</button>
                <div className="absolute right-0 mt-1 w-56 bg-white dark:bg-[#202024] border border-slate-200 dark:border-slate-700 rounded-lg shadow-xl hidden group-hover:block z-50 overflow-hidden">
                  <button onClick={()=>exportImage('png')} className="w-full text-left px-4 py-3 text-xs font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-[#2A2B30]">匯出高清 PNG ({canvasSize.w}x{canvasSize.h})</button>
                  <button onClick={()=>exportImage('svg')} className="w-full text-left px-4 py-3 text-xs font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-[#2A2B30]">匯出高解析向量 SVG</button>
                </div>
              </div>
            </div>
          </div>

          {/* RWD 雙分頁 */}
          <div className="lg:hidden bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-3 py-2 flex gap-1 shrink-0 z-10 overflow-x-auto">
            {['library', 'canvas', 'settings'].map(t => (
              <button key={t} onClick={() => setMobileSubTab(t)} className={`whitespace-nowrap px-4 py-2 rounded-md text-xs font-bold transition-all ${mobileSubTab === t ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400' : 'text-slate-500'}`}>
                {t === 'library' ? '元件圖庫' : t === 'canvas' ? '畫布視圖' : '屬性設定'}
              </button>
            ))}
          </div>

          {/* 大框架工作區 */}
          <div className="flex flex-1 min-h-0 overflow-hidden relative w-full">
            
            {/* 左側：圖庫與繪圖工具 */}
            <div className={`w-full lg:w-72 bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex-col shrink-0 z-20 ${mobileSubTab === 'library' ? 'flex' : 'hidden lg:flex'}`}>
              <div className="flex border-b border-slate-200 dark:border-slate-800">
                <button onClick={() => setLeftTab('library')} className={`flex-1 py-3 text-xs font-bold flex items-center justify-center gap-1.5 border-b-2 ${leftTab === 'library' ? 'border-indigo-600 text-indigo-600 dark:text-indigo-400' : 'border-transparent text-slate-500'}`}><Icon name="layoutGrid" /> 活動元件</button>
                <button onClick={() => setLeftTab('custom')} className={`flex-1 py-3 text-xs font-bold flex items-center justify-center gap-1.5 border-b-2 ${leftTab === 'custom' ? 'border-indigo-600 text-indigo-600 dark:text-indigo-400' : 'border-transparent text-slate-500'}`}><Icon name="penTool" /> 自訂繪圖</button>
              </div>

              <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                {leftTab === 'library' ? (
                  <div className="space-y-6">
                    {['會議論壇', '市集展攤', '戶外與安全'].map(cat => (
                      <div key={cat}>
                        <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">{cat}</h3>
                        <div className="grid grid-cols-2 gap-2">
                          {Object.entries(componentSpecs).filter(([k, v]) => v.category === cat).map(([k, spec]) => (
                            <button 
                              key={k} 
                              onClick={() => { setDraggingCompType(k); showToast(`選擇了 ${spec.name}，請點擊畫布放置`); setMobileSubTab('canvas'); }}
                              className={`p-2.5 rounded-xl border flex flex-col items-center gap-1 transition ${draggingCompType === k ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-500/10' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-[#15151A] hover:border-indigo-300'}`}
                            >
                              <span className="text-xl">{spec.icon}</span>
                              <span className="text-[11px] font-bold text-slate-600 dark:text-slate-300 mt-1">{spec.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="space-y-3">
                    <button onClick={() => startDrawMode('polygon', '多邊形描邊：點擊多點形成外框')} className={`w-full p-3 rounded-xl border flex items-center gap-2 text-sm font-bold ${drawMode==='polygon'?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-[#15151A] border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200'}`}>📐 多邊形描邊</button>
                    <button onClick={() => startDrawMode('rect', '自訂矩形：點選起點與對角點')} className={`w-full p-3 rounded-xl border flex items-center gap-2 text-sm font-bold ${drawMode==='rect'?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-[#15151A] border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200'}`}>🟩 自訂矩形</button>
                    <button onClick={() => startDrawMode('circle', '自訂圓形：點選圓心與邊界')} className={`w-full p-3 rounded-xl border flex items-center gap-2 text-sm font-bold ${drawMode==='circle'?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-[#15151A] border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200'}`}>⭕ 自訂圓形</button>
                    
                    {isDrawing && (
                      <div className="pt-4 border-t border-slate-200 dark:border-slate-800 space-y-2 animate-in slide-in-from-top">
                        <button onClick={() => finishDrawing()} disabled={draftPoints.length < (drawMode==='polygon'?3:2)} className="w-full py-2 bg-emerald-600 text-white font-bold text-xs rounded-lg disabled:opacity-50">確認完成圖形</button>
                        <button onClick={cancelDrawing} className="w-full py-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold text-xs rounded-lg">取消繪製</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>

            {/* 中間：畫布容器 */}
            <div className={`flex-1 min-w-0 relative bg-slate-100 dark:bg-black/60 overflow-auto custom-scrollbar ${mobileSubTab === 'canvas' ? 'block' : 'hidden lg:block'}`}>
              
              <div className="sticky top-4 left-4 z-20 flex flex-col gap-2 pointer-events-none w-max">
                {(isDrawing || draggingCompType) && (
                  <div className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg shadow-lg text-xs font-bold animate-pulse pointer-events-auto">
                    {isDrawing ? `正在繪製... 點擊畫布定點` : `請在畫布上點選要放置的位置`}
                  </div>
                )}
              </div>

              {/* 放大縮小面板 */}
              <div className="fixed bottom-6 right-6 lg:absolute lg:bottom-6 lg:right-6 z-30 flex bg-white dark:bg-[#202024] border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg overflow-hidden">
                <button onClick={() => setScale(s => Math.max(0.1, s - 0.1))} className="px-3 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 font-bold">-</button>
                <button onClick={() => setScale(1)} className="px-3 py-2 text-xs font-bold text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-[#2A2B30] flex items-center justify-center border-x border-slate-200 dark:border-slate-700 min-w-[60px]">
                  {Math.round(scale * 100)}%
                </button>
                <button onClick={() => setScale(s => Math.min(5, s + 0.1))} className="px-3 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 font-bold">+</button>
              </div>

              {/* 畫布實體渲染 */}
              <div className="min-h-full min-w-full grid place-items-center p-8">
                <div 
                  style={{ width: `${canvasSize.w * scale}px`, height: `${canvasSize.h * scale}px` }} 
                  className="relative bg-white dark:bg-[#09090B] border border-slate-200 dark:border-slate-800 shadow-md shrink-0 transition-all duration-150 origin-top-left"
                >
                  <svg 
                    ref={svgRef} 
                    viewBox={`0 0 ${canvasSize.w} ${canvasSize.h}`}
                    className="w-full h-full"
                    onPointerDown={handleSvgPointerDown} 
                    onPointerMove={handlePointerMove} 
                    onPointerUp={handlePointerUp} 
                    onPointerLeave={handlePointerUp}
                    onDoubleClick={handleDoubleClick}
                  >
                    <defs>
                      <pattern id="gridPattern" width={GRID_SIZE} height={GRID_SIZE} patternUnits="userSpaceOnUse">
                        <rect width={GRID_SIZE} height={GRID_SIZE} fill="none" stroke={isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)'} strokeWidth="1" />
                      </pattern>
                      <pattern id="stripes" width="10" height="10" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                        <line x1="0" y1="0" x2="0" y2="10" stroke="#ef4444" strokeWidth="2" opacity="0.6"/>
                      </pattern>
                    </defs>
                    
                    <rect width="100%" height="100%" fill={isDark ? '#09090b' : '#ffffff'} data-bg="true" />
                    <rect width="100%" height="100%" fill="url(#gridPattern)" />

                    {zones.map(zone => {
                      const theme = colorThemes[zone.color] || { stroke: "#4f46e5", darkStroke: "#4f46e5" };
                      const strokeColor = isDark ? theme.darkStroke : theme.stroke;
                      const fillAttr = zone.noFill ? "url(#stripes)" : zone.color;
                      const isSelected = selectedId === zone.id;

                      let center = { x: 0, y: 0 };
                      if (zone.shape === 'rect' && zone.points.length >= 1) {
                        center = { x: zone.points[0].x + (zone.gridW * GRID_SIZE)/2, y: zone.points[0].y + (zone.gridH * GRID_SIZE)/2 };
                      } else if (zone.shape === 'circle') {
                        center = zone.points[0];
                      } else {
                        center = getCentroid(zone.points);
                      }

                      const transform = `translate(${zone.offsetX || 0}, ${zone.offsetY || 0}) rotate(${zone.rotation || 0} ${center.x} ${center.y})`;

                      return (
                        <g key={zone.id} transform={transform} data-id={zone.id}>
                          {zone.shape === 'rect' && zone.points.length > 0 && (
                            <rect 
                              x={zone.points[0].x} y={zone.points[0].y} width={zone.gridW * GRID_SIZE} height={zone.gridH * GRID_SIZE} rx="6"
                              fill={fillAttr} fillOpacity={isSelected ? 0.8 : 0.4}
                              stroke={isSelected ? '#4f46e5' : strokeColor} strokeWidth={isSelected ? 4 : 2}
                              strokeDasharray={zone.noFill && isSelected ? "6 4" : "none"}
                              className="zone-shape"
                              onPointerDown={(e) => handlePointerDown(e, 'zone', zone.id)}
                            />
                          )}
                          {zone.shape === 'circle' && zone.points.length > 0 && (
                            <circle 
                              cx={zone.points[0].x} cy={zone.points[0].y} r={(Math.max(zone.gridW, zone.gridH) * GRID_SIZE) / 2}
                              fill={fillAttr} fillOpacity={isSelected ? 0.8 : 0.4}
                              stroke={isSelected ? '#4f46e5' : strokeColor} strokeWidth={isSelected ? 4 : 2}
                              className="zone-shape"
                              onPointerDown={(e) => handlePointerDown(e, 'zone', zone.id)}
                            />
                          )}
                          {zone.shape === 'polygon' && zone.points.length > 2 && (
                            <polygon 
                              points={zone.points.map(p => `${p.x},${p.y}`).join(" ")}
                              fill={fillAttr} fillOpacity={isSelected ? 0.8 : 0.4}
                              stroke={isSelected ? '#4f46e5' : strokeColor} strokeWidth={isSelected ? 4 : 2}
                              className="zone-shape"
                              onPointerDown={(e) => handlePointerDown(e, 'zone', zone.id)}
                            />
                          )}
                          
                          <rect x={center.x - 45} y={center.y - 12} width="90" height="24" rx="12" fill={isDark ? '#1e293b' : '#ffffff'} stroke={strokeColor} strokeWidth="1" opacity="0.9" style={{pointerEvents:'none'}} />
                          <text x={center.x} y={center.y + 4} textAnchor="middle" fill={isDark ? '#f8fafc' : '#0f172a'} fontSize="11" fontWeight="bold" style={{pointerEvents:'none'}}>{zone.name}</text>

                          {isSelected && zone.shape === 'polygon' && zone.points.map((pt, idx) => (
                            <circle 
                              key={idx} cx={pt.x} cy={pt.y} r="6" fill="#4f46e5" stroke="#ffffff" strokeWidth="2" className="point-handle"
                              onPointerDown={(e) => handlePointerDown(e, 'handle', zone.id, idx)}
                            />
                          ))}
                        </g>
                      );
                    })}

                    {isDrawing && draftPoints.length > 0 && (
                      <g>
                        <polyline points={[...draftPoints, mousePos].map(p => `${p.x},${p.y}`).join(" ")} fill="none" stroke="#4f46e5" strokeWidth="2" strokeDasharray="6 6" />
                        {draftPoints.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="5" fill="#4f46e5" />)}
                      </g>
                    )}
                  </svg>
                </div>
              </div>
            </div>

            {/* 右側：屬性設定與圖層清單 */}
            <div className={`w-full lg:w-72 bg-white dark:bg-[#202024] border-l border-slate-200 dark:border-slate-800 flex-col shrink-0 z-20 overflow-y-auto custom-scrollbar ${mobileSubTab === 'settings' ? 'flex' : 'hidden lg:flex'}`}>
              
              <div className="p-4 border-b border-slate-200 dark:border-slate-800">
                {/* 畫布底圖設定 */}
                <div className="mb-6 pb-4 border-b border-slate-200 dark:border-slate-800/60">
                  <h2 className="font-bold text-xs text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Icon name="layoutGrid" /> 畫布底圖設定</h2>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 mb-1">畫布寬度 (px)</label>
                      <input type="number" min="100" value={canvasSize.w} onChange={e => setCanvasSize(prev => ({...prev, w: parseInt(e.target.value) || 100}))} className="w-full bg-slate-50 dark:bg-[#15151A] border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs font-bold outline-none focus:ring-1 focus:ring-indigo-500 text-slate-900 dark:text-slate-100" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 mb-1">畫布高度 (px)</label>
                      <input type="number" min="100" value={canvasSize.h} onChange={e => setCanvasSize(prev => ({...prev, h: parseInt(e.target.value) || 100}))} className="w-full bg-slate-50 dark:bg-[#15151A] border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs font-bold outline-none focus:ring-1 focus:ring-indigo-500 text-slate-900 dark:text-slate-100" />
                    </div>
                  </div>
                </div>

                {/* 元件屬性 */}
                <h2 className="font-bold text-xs text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-1.5"><Icon name="settings" /> 元件屬性</h2>
                
                {selectedZone ? (
                  <div className="space-y-4 animate-in fade-in">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 mb-1">自訂名稱</label>
                      <input type="text" value={selectedZone.name} onChange={e => updateSelectedZone({name: e.target.value})} className="w-full bg-slate-50 dark:bg-[#15151A] border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs font-bold outline-none focus:ring-1 focus:ring-indigo-500 text-slate-900 dark:text-slate-100" />
                    </div>
                    {selectedZone.shape !== 'polygon' && (
                      <div className="grid grid-cols-2 gap-2">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-400 mb-1">寬度 (格)</label>
                          <input type="number" min="1" value={selectedZone.gridW} onChange={e => updateSelectedZone({gridW: Math.max(1, parseInt(e.target.value)||1)})} className="w-full bg-slate-50 dark:bg-[#15151A] border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs font-bold text-center outline-none text-slate-900 dark:text-slate-100" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-slate-400 mb-1">高度 (格)</label>
                          <input type="number" min="1" value={selectedZone.gridH} onChange={e => updateSelectedZone({gridH: Math.max(1, parseInt(e.target.value)||1)})} className="w-full bg-slate-50 dark:bg-[#15151A] border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs font-bold text-center outline-none text-slate-900 dark:text-slate-100" />
                        </div>
                      </div>
                    )}
                    <div>
                      <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-1">
                        <span>旋轉角度</span><span className="text-indigo-500">{selectedZone.rotation || 0}°</span>
                      </div>
                      <input type="range" min="0" max="360" value={selectedZone.rotation || 0} onChange={e => updateSelectedZone({rotation: parseInt(e.target.value)})} className="w-full accent-indigo-600 h-1" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 mb-1.5">視覺顏色分類</label>
                      <div className="flex flex-wrap gap-2">
                        {Object.keys(colorThemes).filter(c=>c!=='transparent').map(c => (
                          <button key={c} onClick={() => updateSelectedZone({color: c, noFill: false})} className={`w-6 h-6 rounded-md transition ${selectedZone.color === c && !selectedZone.noFill ? 'ring-2 ring-indigo-500 scale-110' : ''}`} style={{backgroundColor: c}}></button>
                        ))}
                        <button onClick={() => updateSelectedZone({noFill: !selectedZone.noFill})} className={`no-fill-bg w-6 h-6 rounded-md border border-slate-400 transition ${selectedZone.noFill ? 'ring-2 ring-indigo-500 scale-110' : ''}`} title="無填色(網底)"></button>
                      </div>
                    </div>
                    <div className="pt-2 grid grid-cols-2 gap-2">
                      <button onClick={duplicateZone} className="py-2 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 rounded-lg text-xs font-bold flex items-center justify-center gap-1 hover:bg-indigo-100"><Icon name="copy" /> 複製</button>
                      <button onClick={() => deleteZone(selectedZone.id)} className="py-2 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-xs font-bold flex items-center justify-center gap-1 hover:bg-red-100"><Icon name="trash2" /> 刪除</button>
                    </div>
                  </div>
                ) : (
                  <div className="py-8 flex flex-col items-center justify-center text-slate-400 opacity-50 bg-slate-50 dark:bg-[#15151A] rounded-xl border border-dashed border-slate-200 dark:border-slate-700">
                    <Icon name="mousePointer" className="w-8 h-8 mb-2" />
                    <span className="text-[11px] font-bold">點選畫布元件以編輯屬性</span>
                  </div>
                )}
              </div>

              {/* 圖層清單（功能擴充區） */}
              <div className="p-4 flex-1 flex flex-col min-h-0">
                <div className="flex justify-between items-center mb-2">
                  <h2 className="font-bold text-xs text-slate-500 uppercase tracking-wider flex items-center gap-1.5"><Icon name="layers" /> 圖層清單</h2>
                  <span className="text-[10px] font-bold bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full">{zones.length}</span>
                </div>
                
                <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-1">
                  {[...zones].reverse().map(z => {
                    const isSelected = selectedId === z.id;
                    return (
                      <div 
                        key={z.id} 
                        onClick={() => setSelectedId(z.id)} 
                        className={`flex items-center justify-between p-2 rounded-lg cursor-pointer text-xs font-bold transition ${isSelected ? 'bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-400' : 'hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400'}`}
                      >
                        <div className="flex items-center gap-2 truncate mr-1">
                          <div className={`w-2.5 h-2.5 rounded-full shrink-0 ${z.noFill ? 'border border-red-500 bg-transparent' : ''}`} style={{backgroundColor: z.noFill ? 'transparent' : z.color}}></div>
                          <span className="truncate">{z.name}</span>
                        </div>
                        
                        {/* 擴充功能：當圖層被選取時，顯示精緻的層級調整快捷鍵 */}
                        {isSelected && (
                          <div className="flex items-center gap-0.5 shrink-0 bg-white dark:bg-[#202024] border border-slate-200 dark:border-slate-700 p-0.5 rounded-md shadow-sm" onClick={e => e.stopPropagation()}>
                            <button onClick={() => reorderZone('top')} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition" title="移至最頂">
                              <Icon name="chevronsUp" className="w-3.5 h-3.5" />
                            </button>
                            <button onClick={() => reorderZone('up')} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition" title="向上一層">
                              <Icon name="arrowUp" className="w-3.5 h-3.5" />
                            </button>
                            <button onClick={() => reorderZone('down')} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition" title="向下一層">
                              <Icon name="arrowDown" className="w-3.5 h-3.5" />
                            </button>
                            <button onClick={() => reorderZone('bottom')} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition" title="移至最底">
                              <Icon name="chevronsDown" className="w-3.5 h-3.5" />
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

            </div>
          </div>
          
          {/* Toast */}
          {toastMsg && (
            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900/90 text-white text-xs font-bold px-4 py-2.5 rounded-full shadow-xl z-50 animate-in slide-in-from-bottom-2 fade-in">
              {toastMsg}
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    function RootApp() {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      
      return (
        <AppLayout activePage="floorplan" theme={theme} toggleTheme={toggleTheme}>
          <FloorPlanApp theme={theme} />
        </AppLayout>
      );
    }
    root.render(<RootApp />);
  </script>
</body>
</html>
