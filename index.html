<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventScout - 場勘與佈置的專業小幫手</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React 18 & ReactDOM 18 (Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel compiler to compile JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* 專業滾動條樣式 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569;
    }
    
    /* 列印專用 CSS 調整 */
    @media print {
      .print\:hidden { display: none !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:w-full { width: 100% !important; }
      .print\:absolute { position: absolute !important; }
      .print\:inset-0 { inset: 0 !important; }
    }
  </style>
</head>

    // 核心 App 元件
    function EventScoutApp() {
      const [activeTab, setActiveTab] = useState('home');
      const [theme, setTheme] = useState('light'); // 'light' or 'dark'

      const toggleTheme = () => {
        setTheme(prev => {
          const next = prev === 'light' ? 'dark' : 'light';
          if (next === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          return next;
        });
      };

      return (
        <div className="flex h-screen bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
          
          {/* Sidebar - Asana Style */}
          <aside className="w-64 bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex flex-col flex-shrink-0 z-20 print:hidden transition-colors duration-300">
            <div className="p-6 flex items-center justify-between">
              <div>
                <h1 className="text-xl font-bold flex items-center gap-2 text-slate-900 dark:text-white">
                  <div className="w-6 h-6 rounded-md bg-indigo-600 flex items-center justify-center">
                    <Icon name="settings" className="w-4 h-4 text-white animate-spin-slow" />
                  </div>
                  EventScout
                </h1>
              </div>
            </div>
            
            <nav className="flex-1 px-3 space-y-1 mt-2">
              <NavItem 
                icon={<Icon name="home" />} 
                label="首頁介紹" 
                isActive={activeTab === 'home'} 
                onClick={() => setActiveTab('home')} 
              />
              <div className="pt-4 pb-2 px-3 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                工作區
              </div>
              <NavItem 
                icon={<Icon name="box" />} 
                label="Truss 架構圖" 
                isActive={activeTab === 'truss'} 
                onClick={() => setActiveTab('truss')} 
              />
              <NavItem 
                icon={<Icon name="map" />} 
                label="平面圖繪製" 
                isActive={activeTab === 'floorplan'} 
                onClick={() => setActiveTab('floorplan')} 
              />
              <NavItem 
                icon={<Icon name="fileText" />} 
                label="場勘報告匯出" 
                isActive={activeTab === 'report'} 
                onClick={() => setActiveTab('report')} 
              />
            </nav>
            
            <div className="p-4 border-t border-slate-100 dark:border-slate-800/50">
              <button 
                onClick={toggleTheme}
                className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] transition-colors"
              >
                <span className="font-medium flex items-center gap-2">
                  {theme === 'light' ? <Icon name="moon" /> : <Icon name="sun" />}
                  {theme === 'light' ? '切換深色模式' : '切換淺色模式'}
                </span>
              </button>
              <div className="text-[10px] text-slate-400 dark:text-slate-600 text-center mt-4">
                &copy; 2026 Event Planner Tool
              </div>
            </div>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 overflow-y-auto relative print:w-full print:absolute print:inset-0 bg-[#F6F8F9] dark:bg-[#15151A] transition-colors duration-300">
            {activeTab === 'home' && <HomeTab onNavigate={setActiveTab} />}
            {activeTab === 'truss' && <TrussTab />}
            {activeTab === 'floorplan' && <FloorPlanTab />}
            {activeTab === 'report' && <ReportTab />}
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, isActive, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm ${
            isActive 
              ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 font-semibold' 
              : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] hover:text-slate-900 dark:hover:text-slate-200 font-medium'
          }`}
        >
          {icon}
          <span>{label}</span>
        </button>
      );
    }

    function HomeTab({ onNavigate }) {
      return (
        <div className="min-h-full pb-12 animate-in fade-in duration-500">
          {/* Header Area */}

    function TrussTab() {
      const canvasRef = useRef(null);
      const [params, setParams] = useState({
        type: 'backdrop', 
        width: 400, 
        height: 300, 
        depth: 50,  
        thickness: 30 
      });

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        const width = 800;
        const height = 600;
        canvas.width = width * 2;
        canvas.height = height * 2;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.scale(2, 2);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = '#1e293b';
        ctx.fillStyle = '#1e293b';
        ctx.lineWidth = 2;
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';

        const cx = width / 2;
        const cy = height / 2;

        const maxRealDim = Math.max(params.width, params.height);
        const scale = 400 / maxRealDim; 

        const drawW = params.width * scale;
        const drawH = params.height * scale;
        const drawT = params.thickness * scale; 

        const startX = cx - drawW / 2;
        const startY = cy - drawH / 2;

        const drawTrussSegment = (x, y, w, h, isVertical) => {
          ctx.strokeRect(x, y, w, h);
          ctx.beginPath();
          if (isVertical) {
            const segments = Math.floor(h / drawT);
            const step = h / segments;
            for (let i = 0; i < segments; i++) {
              ctx.moveTo(x, y + i * step);
              ctx.lineTo(x + w, y + i * step + step / 2);
              ctx.lineTo(x, y + (i + 1) * step);
            }
          } else {
            const segments = Math.floor(w / drawT);
            const step = w / segments;
            for (let i = 0; i < segments; i++) {
              ctx.moveTo(x + i * step, y);
              ctx.lineTo(x + i * step + step / 2, y + h);
              ctx.lineTo(x + (i + 1) * step, y);
            }
          }
          ctx.stroke();
        };

        if (params.type === 'backdrop') {
          drawTrussSegment(startX, startY, drawW, drawT, false);
          drawTrussSegment(startX, startY, drawT, drawH, true);
          drawTrussSegment(startX + drawW - drawT, startY, drawT, drawH, true);
          
          ctx.fillStyle = '#64748b';
          ctx.fillText('帆布/背板區域', cx, cy);
          ctx.fillStyle = '#1e293b';

        } else if (params.type === 'stage') {
          drawTrussSegment(startX, startY, drawW, drawT, false);
          drawTrussSegment(startX, startY, drawT, drawH, true);
          drawTrussSegment(startX + drawW - drawT, startY, drawT, drawH, true);
          ctx.strokeRect(startX - 20, startY + drawH - drawT, drawW + 40, drawT);
          ctx.fillRect(startX - 20, startY + drawH - drawT, drawW + 40, drawT);
          
          ctx.fillStyle = '#f8fafc';
          ctx.fillText('舞台區域', cx, cy + drawH/4);
          ctx.fillStyle = '#1e293b';
        }

        const drawDimLine = (x1, y1, x2, y2, text, offset) => {
          ctx.beginPath();
          const dx = x2 - x1;
          const dy = y2 - y1;
          const len = Math.sqrt(dx*dx + dy*dy);
          const nx = -dy / len;
          const ny = dx / len;
          
          const px1 = x1 + nx * offset;
          const py1 = y1 + ny * offset;
          const px2 = x2 + nx * offset;
          const py2 = y2 + ny * offset;

          ctx.moveTo(px1, py1);
          ctx.lineTo(px2, py2);
          
          ctx.moveTo(px1 - nx * 5, py1 - ny * 5);
          ctx.lineTo(px1 + nx * 5, py1 + ny * 5);
          ctx.moveTo(px2 - nx * 5, py2 - ny * 5);
          ctx.lineTo(px2 + nx * 5, py2 + ny * 5);
          ctx.stroke();

          ctx.save();
          ctx.translate((px1+px2)/2 - nx*15, (py1+py2)/2 - ny*15);
          if (Math.abs(dy) > Math.abs(dx)) {
            ctx.rotate(-Math.PI/2);
          }
          ctx.fillStyle = '#1e293b';
          ctx.fillText(text, 0, 5);
          ctx.restore();
        };

        drawDimLine(startX, startY + drawH, startX + drawW, startY + drawH, `寬度: ${params.width} cm`, 40);
        drawDimLine(startX, startY, startX, startY + drawH, `高度: ${params.height} cm`, 40);

        ctx.textAlign = 'left';
        ctx.font = 'bold 20px sans-serif';
        ctx.fillText(params.type === 'backdrop' ? '打卡牆 Truss 結構圖' : '舞台 Truss 結構圖', 40, 50);
        ctx.font = '14px sans-serif';
        ctx.fillText(`總寬: ${params.width}cm | 總高: ${params.height}cm | 深度: ${params.depth}cm`, 40, 75);
        ctx.fillText(`Truss 規格: ${params.thickness}x${params.thickness} cm`, 40, 95);
        ctx.fillStyle = '#64748b';
        ctx.fillText('此圖面僅供示意與尺寸參考，請依現場實際狀況為主。', 40, 115);

      }, [params]);

      const handleExport = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `truss_blueprint_${params.width}x${params.height}.png`;
        link.href = dataUrl;
        link.click();
      };

      return (
        <div className="h-full flex flex-col animate-in fade-in transition-colors">
          <div className="px-8 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#202024] flex justify-between items-center shrink-0">
            <div>
              <h2 className="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                <Icon name="box" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" />
                Truss 架構圖繪製
              </h2>
            </div>
            <button 
              onClick={handleExport}
              className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 shadow-sm transition-colors text-sm"
            >
              <Icon name="download" className="w-4 h-4" /> 匯出白底圖面
            </button>
          </div>

          <div className="flex flex-1 min-h-0">
            {/* Controls Panel */}
            <div className="w-80 bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 p-6 flex flex-col gap-5 overflow-y-auto custom-scrollbar">
              <div>
                <label className="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-2">結構類型</label>
                <div className="flex gap-2">
                  <button 
                    onClick={() => setParams({...params, type: 'backdrop'})}
                    className={`flex-1 py-1.5 rounded-md border text-sm font-medium transition-colors ${params.type === 'backdrop' ? 'bg-indigo-50 dark:bg-indigo-500/20 border-indigo-200 dark:border-indigo-500/50 text-indigo-700 dark:text-indigo-300' : 'bg-white dark:bg-[#15151A] border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-400'}`}
                  >
                    打卡牆/背板
                  </button>
                  <button 
                    onClick={() => setParams({...params, type: 'stage'})}
                    className={`flex-1 py-1.5 rounded-md border text-sm font-medium transition-colors ${params.type === 'stage' ? 'bg-indigo-50 dark:bg-indigo-500/20 border-indigo-200 dark:border-indigo-500/50 text-indigo-700 dark:text-indigo-300' : 'bg-white dark:bg-[#15151A] border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-400'}`}
                  >
                    舞台主結構
                  </button>
                </div>
              </div>

              <div className="space-y-4">
                <InputGroup 
                  label="總寬度 Width (cm)" 
                  type="number" 
                  value={params.width}
                  onChange={(e) => setParams({...params, width: Number(e.target.value)})}
                />
                <InputGroup 
                  label="總高度 Height (cm)" 
                  type="number" 
                  value={params.height}
                  onChange={(e) => setParams({...params, height: Number(e.target.value)})}
                />
                <InputGroup 
                  label="深度 Depth/支撐 (cm)" 
                  type="number" 
                  value={params.depth}
                  onChange={(e) => setParams({...params, depth: Number(e.target.value)})}
                />
                
                <div>
                  <label className="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1">Truss 規格 (cm)</label>
                  <select 
                    value={params.thickness}
                    onChange={(e) => setParams({...params, thickness: Number(e.target.value)})}
                    className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-900 dark:text-slate-100 transition-colors"
                  >
                    <option value={20}>20 x 20 (輕型)</option>
                    <option value={30}>30 x 30 (標準)</option>
                    <option value={40}>40 x 40 (重型)</option>
                  </select>
                </div>
              </div>
            </div>

            {/* Canvas Preview Area */}
            <div className="flex-1 bg-[#F6F8F9] dark:bg-[#15151A] flex items-center justify-center p-8 overflow-hidden">
              <div className="shadow-lg border border-slate-200 dark:border-slate-800 bg-white">
                <canvas 
                  ref={canvasRef} 
                  className="max-w-full max-h-full object-contain block"
                ></canvas>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function FloorPlanTab() {
      const canvasRef = useRef(null);
      const [leftTab, setLeftTab] = useState('library'); 
      
      const [items, setItems] = useState([
        { id: 1, type: 'rect', cx: 400, cy: 200, w: 200, h: 80, label: '主舞台', color: '#fef3c7', rotation: 0, scale: 1 },

      ]);
      const [selectedId, setSelectedId] = useState(null);
      const [draggingId, setDraggingId] = useState(null);
      
      const [mode, setMode] = useState('select'); 
      const [polygonPoints, setPolygonPoints] = useState([]);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const lastMouseRef = useRef({ x: 0, y: 0 });

      const libraryCategories = [
        {
          name: '會議論壇',

            { label: '演講舞台', w: 180, h: 60, icon: <Icon name="presentation" className="w-5 h-5 text-amber-500 mb-1" />, color: '#fef3c7' },

            { label: '貴賓沙發', w: 100, h: 40, icon: <Icon name="sofa" className="w-5 h-5 text-emerald-500 mb-1" />, color: '#d1fae5' },
            { label: '觀眾排椅', w: 120, h: 80, icon: <Icon name="users" className="w-5 h-5 text-blue-500 mb-1" />, color: '#dbeafe' },
            { label: '交流高腳桌', w: 40, h: 40, icon: <Icon name="coffee" className="w-5 h-5 text-orange-400 mb-1" />, color: '#ffedd5' },
            { label: '報到服務台', w: 120, h: 40, icon: <Icon name="clipboardList" className="w-5 h-5 text-teal-500 mb-1" />, color: '#ccfbf1' }
          ]
        },
        {
          name: '市集展攤',
          items: [
            { label: '標準攤位', w: 90, h: 90, icon: <Icon name="store" className="w-5 h-5 text-green-600 mb-1" />, color: '#bbf7d0' },
            { label: '造型餐車', w: 120, h: 60, icon: <Icon name="truck" className="w-5 h-5 text-amber-600 mb-1" />, color: '#fde68a' },
            { label: '陳列長桌', w: 120, h: 40, icon: <Icon name="table" className="w-5 h-5 text-orange-700 mb-1" />, color: '#fed7aa' },
            { label: '市集圓桌', w: 60, h: 60, icon: <Icon name="disc" className="w-5 h-5 text-orange-500 mb-1" />, color: '#ffedd5' },
            { label: '大遮陽傘', w: 80, h: 80, icon: <Icon name="umbrella" className="w-5 h-5 text-sky-500 mb-1" />, color: '#bae6fd' },
            { label: '雙面立牌', w: 40, h: 20, icon: <Icon name="panelTop" className="w-5 h-5 text-slate-700 mb-1" />, color: '#e2e8f0' }
          ]
        },
        {
          name: '戶外與安全',
          items: [
            { label: '活動帳篷', w: 100, h: 100, icon: <Icon name="tent" className="w-5 h-5 text-amber-700 mb-1" />, color: '#fed7aa' },
            { label: '充氣拱門', w: 160, h: 30, icon: <Icon name="rainbow" className="w-5 h-5 text-pink-500 mb-1" />, color: '#fbcfe8' },
            { label: '流動廁所', w: 60, h: 60, icon: <Icon name="droplets" className="w-5 h-5 text-blue-500 mb-1" />, color: '#e0f2fe' },
            { label: '醫護站', w: 90, h: 60, icon: <Icon name="heartPulse" className="w-5 h-5 text-red-500 mb-1" />, color: '#fecaca' },
            { label: '美化植栽', w: 50, h: 50, icon: <Icon name="treePine" className="w-5 h-5 text-emerald-600 mb-1" />, color: '#a7f3d0' }
          ]
        }
      ];

      const getMousePos = (canvas, evt) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return { 
          x: (evt.clientX - rect.left) * scaleX, 
          y: (evt.clientY - rect.top) * scaleY 
        };
      };

      const isPointInRotatedRect = (pos, item) => {
        const dx = pos.x - item.cx;
        const dy = pos.y - item.cy;
        const rad = -(item.rotation || 0) * Math.PI / 180;
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
        const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        const actualW = item.w * (item.scale || 1);
        const actualH = item.h * (item.scale || 1);
        return Math.abs(rx) <= actualW / 2 && Math.abs(ry) <= actualH / 2;
      };

      const isPointInPolygon = (point, vs) => {
        let x = point.x, y = point.y;
        let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
          let xi = vs[i].x, yi = vs[i].y;
          let xj = vs[j].x, yj = vs[j].y;
          let intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      };

      const handleMouseDown = (e) => {
        const canvas = canvasRef.current;
        const pos = getMousePos(canvas, e);
        
        if (mode === 'draw_polygon') {
          if (polygonPoints.length > 2) {
            const firstPt = polygonPoints[0];
            const dist = Math.sqrt(Math.pow(pos.x - firstPt.x, 2) + Math.pow(pos.y - firstPt.y, 2));
            if (dist < 20) {
              finishPolygon();
              return;
            }
          }
          setPolygonPoints([...polygonPoints, pos]);
          return;
        }

        let hitId = null;
        for (let i = items.length - 1; i >= 0; i--) {
          const item = items[i];
          if (item.type === 'rect') {
            if (isPointInRotatedRect(pos, item)) { hitId = item.id; break; }
          } else if (item.type === 'polygon') {
            if (isPointInPolygon(pos, item.points)) { hitId = item.id; break; }
          }
        }

        setSelectedId(hitId);
        if (hitId) {
          setDraggingId(hitId);
          lastMouseRef.current = pos;
        }
      };

      const handleMouseMove = (e) => {
        const canvas = canvasRef.current;
        const pos = getMousePos(canvas, e);
        setMousePos(pos);

        if (draggingId) {
          const dx = pos.x - lastMouseRef.current.x;
          const dy = pos.y - lastMouseRef.current.y;
          lastMouseRef.current = pos;

          setItems(items.map(item => {
            if (item.id === draggingId) {
              if (item.type === 'rect') {
                return { ...item, cx: item.cx + dx, cy: item.cy + dy };
              } else if (item.type === 'polygon') {
                return { ...item, points: item.points.map(p => ({ x: p.x + dx, y: p.y + dy })) };
              }
            }
            return item;
          }));
        }
      };

      const handleMouseUp = () => { setDraggingId(null); };

      const handleDoubleClick = () => {
        if (mode === 'draw_polygon' && polygonPoints.length >= 3) finishPolygon();
      };

      const finishPolygon = () => {
        if (polygonPoints.length < 3) {
          setPolygonPoints([]); setMode('select'); return;
        }
        const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        setItems([...items, { 
          id: newId, type: 'polygon', points: polygonPoints, 
          label: '不規則區域', color: '#fef08a' 
        }]);
        setPolygonPoints([]);
        setMode('select');
      };

      const addLibraryItem = (libItem) => {
        const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        setItems([...items, { 
          id: newId, type: 'rect', cx: 400, cy: 300, 
          w: libItem.w, h: libItem.h, label: libItem.label, color: libItem.color, rotation: 0, scale: 1
        }]);
        setSelectedId(newId);
        setMode('select');
      };

      const updateItem = (id, field, value) => {
        setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
      };

      const deleteItem = (id) => {
        setItems(items.filter(item => item.id !== id));
        if (selectedId === id) setSelectedId(null);
      };

      const clearCanvas = () => {
        if(window.confirm('確定要清空畫布重新繪製嗎？')) {
          setItems([]); setSelectedId(null); setPolygonPoints([]);
        }
      };

      const getPolygonCentroid = (pts) => {
        let first = pts[0], last = pts[pts.length - 1];
        if (first.x !== last.x || first.y !== last.y) pts = [...pts, first];
        let twicearea = 0, x = 0, y = 0, nPts = pts.length, p1, p2, f;
        for (let i = 0, j = nPts - 1; i < nPts; j = i++) {
          p1 = pts[i]; p2 = pts[j];
          f = p1.x * p2.y - p2.x * p1.y; twicearea += f; x += (p1.x + p2.x) * f; y += (p1.y + p2.y) * f;
        }
        f = twicearea * 3;
        return { x: x / f, y: y / f };
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        const width = 800;
        const height = 600;
        canvas.width = width;
        canvas.height = height;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 1;
        for(let x=0; x<=width; x+=20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
        for(let y=0; y<=height; y+=20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }

        items.forEach(item => {
          ctx.save();
          const isSelected = item.id === selectedId;
          ctx.fillStyle = item.color;
          ctx.strokeStyle = isSelected ? '#4f46e5' : '#64748b'; 
          ctx.lineWidth = isSelected ? 2 : 1;
          
          if (isSelected) {
            ctx.shadowColor = 'rgba(79, 70, 229, 0.4)';
            ctx.shadowBlur = 6;
          }

          if (item.type === 'rect') {
            const actualW = item.w * (item.scale || 1);
            const actualH = item.h * (item.scale || 1);
            ctx.translate(item.cx, item.cy);
            ctx.rotate((item.rotation || 0) * Math.PI / 180);
            ctx.beginPath();
            ctx.roundRect(-actualW / 2, -actualH / 2, actualW, actualH, 4);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'transparent';
            ctx.fillText(item.label, 0, 0);

          } else if (item.type === 'polygon') {
            ctx.beginPath();
            item.points.forEach((p, idx) => {
              if (idx === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            const centroid = getPolygonCentroid(item.points);
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'transparent';
            ctx.fillText(item.label, centroid.x, centroid.y);
          }
          ctx.restore();
        });

        if (mode === 'draw_polygon' && polygonPoints.length > 0) {
          ctx.strokeStyle = '#4f46e5';
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          polygonPoints.forEach((p, idx) => {
            if (idx === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
            ctx.fillStyle = '#4f46e5';
            ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
          });
          ctx.lineTo(mousePos.x, mousePos.y);
          ctx.stroke();
          ctx.setLineDash([]); 

          if (polygonPoints.length > 2) {
            ctx.beginPath();
            ctx.arc(polygonPoints[0].x, polygonPoints[0].y, 5, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(79, 70, 229, 0.5)';
            ctx.fill();
          }
        }
      }, [items, selectedId, mode, polygonPoints, mousePos]);

      const selectedItem = items.find(i => i.id === selectedId);

      return (
        <div className="h-full flex flex-col animate-in fade-in transition-colors">
          <div className="px-8 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#202024] flex justify-between items-center shrink-0">
            <h2 className="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
              <Icon name="map" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" />
              平面圖繪製與自訂編輯
            </h2>
            <div className="flex gap-3">
              <button onClick={clearCanvas} className="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-[#2A2B30] px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors border border-slate-200 dark:border-slate-700">
                <Icon name="rotateCcw" className="w-4 h-4" /> 重設畫布
              </button>
              <button onClick={() => {
                const link = document.createElement('a');
                link.download = 'floor_plan.png';
                link.href = canvasRef.current.toDataURL();
                link.click();
              }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm transition-colors">
                <Icon name="download" className="w-4 h-4" /> 匯出圖面
              </button>
            </div>
          </div>

          <div className="flex flex-1 min-h-0 overflow-hidden">
            {/* Left Panel */}
            <div className="w-[260px] bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex flex-col shrink-0 z-10">
              <div className="flex border-b border-slate-200 dark:border-slate-800">
                <button 
                  onClick={() => setLeftTab('library')}
                  className={`flex-1 py-3 text-xs font-bold flex items-center justify-center gap-1 border-b-2 transition-colors ${leftTab === 'library' ? 'border-indigo-600 text-indigo-700 dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-500/10' : 'border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30]'}`}
                >
                  <Icon name="layoutGrid" className="w-3.5 h-3.5" /> 活動元件
                </button>
                <button 
                  onClick={() => setLeftTab('custom')}
                  className={`flex-1 py-3 text-xs font-bold flex items-center justify-center gap-1 border-b-2 transition-colors ${leftTab === 'custom' ? 'border-indigo-600 text-indigo-700 dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-500/10' : 'border-transparent text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30]'}`}
                >
                  <Icon name="penTool" className="w-3.5 h-3.5" /> 自訂繪圖
                </button>
              </div>

              <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                {leftTab === 'library' ? (
                  <div className="space-y-6">
                    {libraryCategories.map(cat => (
                      <div key={cat.name}>
                        <h3 className="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">
                          {cat.name}
                        </h3>
                        <div className="grid grid-cols-2 gap-2">
                          {cat.items.map(libItem => (
                            <button
                              key={libItem.label}
                              onClick={() => addLibraryItem(libItem)}
                              className="flex flex-col items-center justify-center p-3 bg-white dark:bg-[#15151A] border border-slate-200 dark:border-slate-700 rounded-lg hover:border-indigo-400 dark:hover:border-indigo-500 transition-colors group"
                            >
                              <div className="group-hover:scale-110 transition-transform">{libItem.icon}</div>
                              <span className="text-[11px] font-medium text-slate-600 dark:text-slate-300 mt-1">{libItem.label}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 bg-indigo-50 dark:bg-indigo-500/10 rounded-lg border border-indigo-100 dark:border-indigo-500/20">
                      <h4 className="font-bold text-indigo-800 dark:text-indigo-300 text-sm mb-2 flex items-center gap-2">
                        <Icon name="edit3" className="w-4 h-4" /> 繪製不規則邊界
                      </h4>
                      <p className="text-xs text-indigo-600/80 dark:text-indigo-400/80 mb-3 leading-relaxed">
                        適合標示畸零地、特定管制區等。點擊畫布定點，雙擊滑鼠完成閉合。
                      </p>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setMode('select')}
                          className={`flex-1 py-1.5 rounded-md text-xs font-bold transition-all border ${mode === 'select' ? 'bg-white dark:bg-[#202024] border-indigo-300 dark:border-indigo-500 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'border-transparent text-slate-500 hover:bg-white/50 dark:hover:bg-[#202024]/50'}`}
                        >
                          選取模式
                        </button>
                        <button 
                          onClick={() => { setMode('draw_polygon'); setSelectedId(null); }}
                          className={`flex-1 py-1.5 rounded-md text-xs font-bold transition-all border ${mode === 'draw_polygon' ? 'bg-indigo-600 border-indigo-600 text-white shadow-sm' : 'border-slate-300 dark:border-slate-600 bg-white dark:bg-[#15151A] text-slate-600 dark:text-slate-300'}`}
                        >
                          開始繪製
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Center Canvas */}
            <div className="flex-1 relative flex items-center justify-center p-6 bg-[#F6F8F9] dark:bg-[#15151A] overflow-hidden">
              {mode === 'draw_polygon' && (
                 <div className="absolute top-6 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-md z-10 pointer-events-none">
                   正在繪製多邊形：請點擊定點，雙擊滑鼠閉合
                 </div>
              )}
              
              <div className="relative shadow-md border border-slate-200 dark:border-slate-800 bg-white">
                <canvas 
                  ref={canvasRef}
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                  onDoubleClick={handleDoubleClick}
                  className={`${mode === 'draw_polygon' ? 'cursor-crosshair' : (draggingId ? 'cursor-grabbing' : 'cursor-pointer')} max-w-full max-h-full object-contain block`}
                ></canvas>
              </div>
            </div>

            {/* Right Panel */}
            <div className="w-[280px] bg-white dark:bg-[#202024] border-l border-slate-200 dark:border-slate-800 flex flex-col shrink-0 z-10 overflow-y-auto custom-scrollbar">
              <div className="p-4 border-b border-slate-100 dark:border-slate-800/50">
                <h3 className="font-bold text-sm text-slate-800 dark:text-slate-200 flex items-center gap-2">
                  <Icon name="settings" className="w-4 h-4 text-slate-400" /> 元件屬性設定
                </h3>
              </div>

              {selectedItem ? (
                <div className="p-5 space-y-6">
                  
                  <div>
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">自訂名稱</label>
                    <input 
                      type="text" value={selectedItem.label} 
                      onChange={(e) => updateItem(selectedItem.id, 'label', e.target.value)}
                      className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-900 dark:text-slate-100 transition-colors"
                    />
                  </div>

                  {selectedItem.type === 'rect' && (
                    <div>
                      <div className="flex justify-between items-center mb-2">
                        <label className="text-xs font-bold text-slate-600 dark:text-slate-400">尺寸微調</label>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <span className="text-[10px] text-slate-400 block mb-1">寬度(W)</span>
                          <input 
                            type="number" value={selectedItem.w} 
                            onChange={(e) => updateItem(selectedItem.id, 'w', Number(e.target.value))}
                            className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm text-center focus:ring-1 focus:ring-indigo-500 outline-none text-slate-900 dark:text-slate-100 transition-colors"
                          />
                        </div>
                        <div>
                          <span className="text-[10px] text-slate-400 block mb-1">高度(H)</span>
                          <input 
                            type="number" value={selectedItem.h} 
                            onChange={(e) => updateItem(selectedItem.id, 'h', Number(e.target.value))}
                            className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm text-center focus:ring-1 focus:ring-indigo-500 outline-none text-slate-900 dark:text-slate-100 transition-colors"
                          />
                        </div>
                      </div>
                    </div>
                  )}

                  {selectedItem.type === 'rect' && (
                    <div>
                      <div className="flex justify-between items-center mb-2">
                        <label className="text-xs font-bold text-slate-600 dark:text-slate-400">旋轉角度</label>
                        <span className="text-xs font-bold text-indigo-600 dark:text-indigo-400">{selectedItem.rotation || 0}°</span>
                      </div>
                      <input 
                        type="range" min="-180" max="180" step="5"
                        value={selectedItem.rotation || 0}
                        onChange={(e) => updateItem(selectedItem.id, 'rotation', Number(e.target.value))}
                        className="w-full accent-indigo-600 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer"
                      />
                    </div>
                  )}

                  <div>
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-3">視覺顏色</label>
                    <div className="flex flex-wrap gap-2">
                      {['#fef3c7', '#fee2e2', '#e0f2fe', '#d1fae5', '#f3e8ff', '#f1f5f9'].map(color => (
                        <button
                          key={color}
                          onClick={() => updateItem(selectedItem.id, 'color', color)}
                          className={`w-6 h-6 rounded-md shadow-sm transition-transform ${selectedItem.color === color ? 'ring-2 ring-offset-2 ring-offset-white dark:ring-offset-[#202024] ring-slate-400 scale-110' : 'border border-slate-200 dark:border-slate-700 hover:scale-110'}`}
                          style={{ backgroundColor: color }}
                        />
                      ))}
                    </div>
                  </div>

                  <div className="pt-5 border-t border-slate-100 dark:border-slate-800">
                    <button onClick={() => deleteItem(selectedItem.id)} className="w-full flex items-center justify-center gap-2 py-2 bg-red-50 dark:bg-red-500/10 hover:bg-red-100 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400 rounded-lg text-sm font-bold transition-colors">
                      <Icon name="trash2" className="w-4 h-4" /> 刪除此元件
                    </button>
                  </div>

                </div>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
                  <div className="w-12 h-12 rounded-full bg-slate-50 dark:bg-[#15151A] flex items-center justify-center mb-3">
                    <Icon name="mousePointer2" className="w-5 h-5 text-slate-300 dark:text-slate-600" />
                  </div>
                  <p className="text-sm text-slate-500 dark:text-slate-400 font-medium">請在畫布上點選元件</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function ReportTab() {
      const [report, setReport] = useState({
        projectName: '2026 年度品牌發表會',
        surveyDate: new Date().toISOString().split('T')[0],
        eventDate: '2026-06-15',
        venueName: '國際展覽中心 A館',
        venueAddress: '台北市信義區...',
        contactInfo: '王經理 0912-345-678',
        areaSize: '約 150 坪',
        ceilingHeight: '4.5 公尺',
        lowestPoint: '3.8 公尺 (空調管線/灑水頭)',
        loadingDock: '地下室 B1 卸貨區，限高 2.5m',
        elevatorSize: '門寬 1.2m / 內寬 2m x 深 3m x 高 2.5m',
        walkwayWidth: '走道最窄處 1.5m',
        power110V: '壁面四周共 8 組雙孔插座 (15A)',
        power220V_380V: '舞台左後方有 380V 動力電箱 (需配置專業技師接電)',
        network: '場地提供付費 Wi-Fi；4G/5G 收訊佳',
        lighting: '基本堪用，為黃光 (3000K) 軌道燈',
        floorMaterial: '大理石地磚 (全區施工需鋪設保護板)',
        wallMaterial: '漆面牆 (嚴禁使用雙面膠，僅可使用無痕膠帶)',
        timeRestriction: '進場: 22:00 後 / 撤場: 12:00 前',
        fireSafety: '滅火器 4 支，逃生門 2 處 (周邊嚴禁堆放雜物)',
        otherNotes: '1. 施工人員需配戴工作證、著反光背心。\n2. 場內全面禁菸飲食。'
      });

      const handleChange = (e) => {
        const { name, value } = e.target;
        setReport(prev => ({ ...prev, [name]: value }));
      };

      return (
        <div className="h-full flex flex-col animate-in fade-in print:p-0 transition-colors">
          
          <div className="px-8 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#202024] flex justify-between items-center shrink-0 print:hidden text-slate-900 dark:text-white">
            <div>
              <h2 className="text-xl font-bold flex items-center gap-2">
                <Icon name="fileText" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" />
                場勘數據報告匯出
              </h2>
            </div>
            <button 
              onClick={() => window.print()}
              className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 shadow-sm transition-colors text-sm"
            >
              <Icon name="printer" className="w-4 h-4" /> 列印 / 存為 PDF
            </button>
          </div>

          <div className="flex flex-1 min-h-0 print:block">
            
            {/* Form Input */}
            <div className="w-[45%] lg:w-[40%] bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 overflow-y-auto print:hidden custom-scrollbar">
              <div className="p-6 space-y-8">
                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">1. 基本資訊</h4>
                  <InputGroup label="專案/活動名稱" name="projectName" value={report.projectName} onChange={handleChange} />
                  <div className="grid grid-cols-2 gap-4">
                    <InputGroup label="場勘日期" name="surveyDate" type="date" value={report.surveyDate} onChange={handleChange} />
                    <InputGroup label="預定活動日期" name="eventDate" type="date" value={report.eventDate} onChange={handleChange} />
                  </div>
                  <InputGroup label="場地名稱" name="venueName" value={report.venueName} onChange={handleChange} />
                  <InputGroup label="場地地址" name="venueAddress" value={report.venueAddress} onChange={handleChange} />
                  <InputGroup label="場地聯絡人/電話" name="contactInfo" value={report.contactInfo} onChange={handleChange} />
                </div>

                <div className="h-px bg-slate-200 dark:bg-slate-700/50"></div>

                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">2. 空間與進撤場動線</h4>
                  <div className="grid grid-cols-2 gap-4">
                    <InputGroup label="預估面積/坪數" name="areaSize" value={report.areaSize} onChange={handleChange} />
                    <InputGroup label="天花板淨高" name="ceilingHeight" value={report.ceilingHeight} onChange={handleChange} />
                  </div>
                  <InputGroup label="最低障礙物高度" name="lowestPoint" value={report.lowestPoint} onChange={handleChange} />
                  <TextAreaGroup label="卸貨區位置與限高" name="loadingDock" value={report.loadingDock} onChange={handleChange} />
                  <TextAreaGroup label="進場電梯尺寸" name="elevatorSize" value={report.elevatorSize} onChange={handleChange} />
                  <InputGroup label="動線最窄處寬度" name="walkwayWidth" value={report.walkwayWidth} onChange={handleChange} />
                </div>

                <div className="h-px bg-slate-200 dark:bg-slate-700/50"></div>

                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">3. 機電與網路設備</h4>
                  <TextAreaGroup label="一般插座 (110V)" name="power110V" value={report.power110V} onChange={handleChange} />
                  <TextAreaGroup label="動力電箱 (220V/380V)" name="power220V_380V" value={report.power220V_380V} onChange={handleChange} />
                  <InputGroup label="場地燈光狀況" name="lighting" value={report.lighting} onChange={handleChange} />
                  <InputGroup label="網路/收訊狀況" name="network" value={report.network} onChange={handleChange} />
                </div>

                <div className="h-px bg-slate-200 dark:bg-slate-700/50"></div>

                <div className="space-y-4">
                  <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2">4. 場地規範與安全</h4>
                  <InputGroup label="地板材質 (保護板規範)" name="floorMaterial" value={report.floorMaterial} onChange={handleChange} />
                  <InputGroup label="牆面材質 (黏貼規範)" name="wallMaterial" value={report.wallMaterial} onChange={handleChange} />
                  <InputGroup label="進撤場時間限制" name="timeRestriction" value={report.timeRestriction} onChange={handleChange} />
                  <InputGroup label="消防設施位置" name="fireSafety" value={report.fireSafety} onChange={handleChange} />
                  <TextAreaGroup label="補充備註事項" name="otherNotes" value={report.otherNotes} onChange={handleChange} rows={3} />
                </div>
              </div>
            </div>

            {/* Print Preview Area */}
            <div className="flex-1 bg-slate-200/50 dark:bg-[#15151A] overflow-y-auto flex justify-center p-8 print:p-0 print:bg-white print:overflow-visible">
              
              <div className="bg-white w-[210mm] min-h-[297mm] shadow-lg print:shadow-none p-12 print:p-0 text-slate-900 mx-auto font-sans">
                
                <div className="border-b-2 border-slate-900 pb-4 mb-8 flex justify-between items-end">
                  <div>
                    <h1 className="text-2xl font-bold text-slate-900 mb-1">{report.projectName}</h1>
                    <h2 className="text-lg font-semibold text-slate-500 tracking-wide">場地勘查檢核報告</h2>
                  </div>
                  <div className="text-right text-xs text-slate-500">
                    <p>勘查日期：{report.surveyDate}</p>
                    <p>列印日期：{new Date().toLocaleDateString()}</p>
                  </div>
                </div>

                <div className="mb-8 p-5 bg-slate-50 border border-slate-200 rounded-md">
                  <div className="grid grid-cols-2 gap-x-8 gap-y-4 text-sm">
                    <InfoRow label="活動日期" value={report.eventDate} />
                    <InfoRow label="場地聯絡" value={report.contactInfo} />
                    <InfoRow label="場地名稱" value={report.venueName} />
                    <div className="col-span-2">
                      <InfoRow label="場地地址" value={report.venueAddress} />
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 gap-6">
                  <SectionBox title="空間與進撤場動線">
                    <div className="grid grid-cols-2 gap-x-8 gap-y-5 text-sm">
                      <DetailItem label="預估面積" value={report.areaSize} />
                      <DetailItem label="天花板淨高" value={report.ceilingHeight} />
                      <DetailItem label="最低障礙物" value={report.lowestPoint} />
                      <DetailItem label="動線最窄處" value={report.walkwayWidth} />
                      <div className="col-span-2"><DetailItem label="卸貨區資訊" value={report.loadingDock} /></div>
                      <div className="col-span-2"><DetailItem label="電梯尺寸限制" value={report.elevatorSize} /></div>
                    </div>
                  </SectionBox>

                  <SectionBox title="機電、網路與視聽">
                    <div className="space-y-5 text-sm">
                      <DetailItem label="一般插座 (110V)" value={report.power110V} />
                      <DetailItem label="動力電箱 (220/380V)" value={report.power220V_380V} />
                      <div className="grid grid-cols-2 gap-8">
                        <DetailItem label="現場燈光" value={report.lighting} />
                        <DetailItem label="網路狀況" value={report.network} />
                      </div>
                    </div>
                  </SectionBox>

                  <SectionBox title="場地規範與安全防護">
                    <div className="grid grid-cols-2 gap-x-8 gap-y-5 text-sm">
                      <DetailItem label="地板防護" value={report.floorMaterial} />
                      <DetailItem label="牆面黏貼" value={report.wallMaterial} />
                      <div className="col-span-2"><DetailItem label="進撤場時間限制" value={report.timeRestriction} /></div>
                      <div className="col-span-2"><DetailItem label="消防與逃生設施" value={report.fireSafety} /></div>
                    </div>
                  </SectionBox>

                  <div className="mt-2">
                    <h3 className="text-sm font-bold text-slate-800 mb-2 border-l-2 border-slate-400 pl-2">補充備註事項</h3>
                    <div className="text-sm text-slate-700 whitespace-pre-wrap pl-3 leading-relaxed">
                      {report.otherNotes || '無'}
                    </div>
                  </div>
                </div>

                <div className="mt-16 pt-8 flex justify-end gap-20 text-sm text-slate-600">
                  <div className="text-center">
                    <div className="w-32 border-b border-slate-400 mb-2 h-8"></div>
                    <p>場勘人員簽名</p>
                  </div>
                  <div className="text-center">
                    <div className="w-32 border-b border-slate-400 mb-2 h-8"></div>
                    <p>場地方確認</p>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    function InputGroup({ label, name, value, onChange, type = "text" }) {
      return (
        <div>
          <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1.5">{label}</label>
          <input 
            type={type} name={name} value={value} onChange={onChange}
            className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-900 dark:text-slate-100 transition-colors"
          />
        </div>
      );
    }

    function TextAreaGroup({ label, name, value, onChange, rows = 2 }) {
      return (
        <div>
          <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1.5">{label}</label>
          <textarea 
            name={name} value={value} onChange={onChange} rows={rows}
            className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none text-slate-900 dark:text-slate-100 transition-colors"
          />
        </div>
      );
    }

    function InfoRow({ label, value }) {
      return (
        <div className="flex border-b border-slate-200 pb-2">
          <span className="text-slate-500 w-20 font-medium shrink-0">{label}</span>
          <span className="text-slate-900 font-semibold">{value || '-'}</span>
        </div>
      );
    }

    function DetailItem({ label, value }) {
      return (
        <div className="flex flex-col gap-1.5">
          <span className="text-slate-500 font-bold text-[11px] uppercase tracking-wider">{label}</span>
          <span className="text-slate-900 font-medium whitespace-pre-wrap">{value || '-'}</span>
        </div>
      );
    }

    function SectionBox({ title, children }) {
      return (
        <div className="border border-slate-300 rounded-lg overflow-hidden">
          <div className="px-4 py-2 bg-slate-100 border-b border-slate-300">
            <h3 className="font-bold text-slate-800 text-sm">{title}</h3>
          </div>
          <div className="p-5">
            {children}
          </div>
        </div>
      );
    }

    // React 18 Mounting
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EventScoutApp />);
  </script>
</body>
</html>
