  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    function Icon({ name, className = "w-4 h-4" }) {

        box: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></svg>,
        map: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" /><line x1="9" y1="3" x2="9" y2="18" /><line x1="15" y1="6" x2="15" y2="21" /></svg>,
        fileText: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z" /><path d="M14 2v4a2 2 0 0 0 2 2h4" /><path d="M10 9H8" /><path d="M16 13H8" /><path d="M16 17H8" /></svg>,
        book: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg>,
        settings: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>,
        calculator: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>,
        sun: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></svg>,
        moon: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z" /></svg>,
        menu: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></svg>,
        x: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
        download: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
        sliders: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>,
        palette: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>,
        calculator: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>,
        focus: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path></svg>
      };
      return icons[name] || null;
    }

    function AppLayout({ activePage, children, theme, toggleTheme }) {
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      return (
        <div className="flex h-screen bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
          <header className="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-4 flex items-center justify-between shrink-0 z-40 transition-colors duration-300">
            <button onClick={() => setIsSidebarOpen(true)} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              <Icon name="menu" className="w-6 h-6" />
            </button>
            <a href="index.html" className="font-bold text-slate-900 dark:text-white flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="w-5 h-5 rounded bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-3 h-3 text-white" /></div>
              EventScout
            </a>
            <button onClick={toggleTheme} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              {theme === 'light' ? <Icon name="moon" className="w-5 h-5" /> : <Icon name="sun" className="w-5 h-5" />}
            </button>
          </header>

          {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="lg:hidden fixed inset-0 bg-black/50 z-40 transition-opacity duration-300" />}

          <aside className={`fixed lg:relative inset-y-0 left-0 w-64 bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex flex-col flex-shrink-0 z-50 transition-transform duration-300 print:hidden lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 flex items-center justify-between">
              <a href="index.html" className="text-xl font-bold flex items-center gap-2 text-slate-900 dark:text-white hover:opacity-80 transition-opacity">
                <div className="w-6 h-6 rounded-md bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-4 h-4 text-white" /></div>
                EventScout
              </a>
              <button onClick={() => setIsSidebarOpen(false)} className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>
            <nav className="flex-1 px-3 space-y-1 mt-2">
              <NavItem href="index.html" icon={<Icon name="home" />} label="首頁介紹" isActive={activePage === 'home'} />
              <NavItem href="knowledge.html" icon={<Icon name="book" />} label="場勘專業知識庫" isActive={activePage === 'knowledge'} />
              <div className="pt-4 pb-2 px-3 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">工作區</div>
              <NavItem href="calculator.html" icon={<Icon name="calculator" />} label="專業尺寸與空間換算" isActive={activePage === 'calculator'} />
              <NavItem href="truss.html" icon={<Icon name="box" />} label="Truss 架構圖" isActive={activePage === 'truss'} />
              <NavItem href="floorplan.html" icon={<Icon name="map" />} label="平面圖繪製" isActive={activePage === 'floorplan'} />
              <NavItem href="report.html" icon={<Icon name="fileText" />} label="場勘報告匯出" isActive={activePage === 'report'} />
            </nav>
            <div className="p-4 border-t border-slate-100 dark:border-slate-800/50">
              <button onClick={toggleTheme} className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] transition-colors">
                <span className="font-medium flex items-center gap-2">{theme === 'light' ? <Icon name="moon" /> : <Icon name="sun" />}{theme === 'light' ? '切換深色模式' : '切換淺色模式'}</span>
              </button>
              <div className="text-[10px] text-slate-400 dark:text-slate-600 text-center mt-4">&copy; 2026 Event Planner Tool</div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col relative pt-14 lg:pt-0 print:pt-0 print:w-full print:absolute print:inset-0 bg-[#F6F8F9] dark:bg-[#15151A] transition-colors duration-300">
            {children}
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, isActive, href }) {
      return (
        <a href={href} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm ${isActive ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 font-semibold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] hover:text-slate-900 dark:hover:text-slate-200 font-medium'}`}>
          {icon}<span>{label}</span>
        </a>
      );
    }

    function InputGroup({ label, value, onChange, type = "text", min, max, step }) {
      return (
        <div>
          <div className="flex justify-between text-xs mb-1.5">
            <label className="text-slate-600 dark:text-slate-400 font-bold">{label}</label>
            <span className="text-indigo-600 dark:text-indigo-400 font-mono font-medium">{value}</span>
          </div>
          <input type={type} min={min} max={max} step={step} value={value} onChange={onChange} className={`w-full ${type === 'range' ? 'accent-indigo-600 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer' : 'bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-900 dark:text-slate-100 transition-colors'}`} />
        </div>
      );
    }

    // 將 Hex 色碼轉為包含透明度的 RGBA (用於輔助線/陰影)
    function adjustHexOpacity(hex, opacity) {
      if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
        let c = hex.substring(1).split('');
        if (c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
        c = '0x' + c.join('');
        return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + opacity + ')';
      }
      return hex;
    }

    function TrussApp({ theme }) {
      const isDark = theme === 'dark';
      const canvasRef = useRef(null);
      const containerRef = useRef(null);

      // UI 狀態 (響應式分頁切換)
      const [mobileTab, setMobileTab] = useState('canvas'); // 'settings', 'canvas'
      const [settingTab, setSettingTab] = useState('dim'); // 'dim', 'style', 'bom'

      // 核心資料狀態
      const [type, setType] = useState('stage'); // 'stage', 'photowall'
      const [dim, setDim] = useState({ w: 12.0, h: 7.0, d: 6.0, deckH: 1.2, trussW: 0.4, steps: true });
      const [media, setMedia] = useState({ type: 'led', w: 8.0, h: 4.0, y: 1.5, text: 'LIVE SHOW', subtext: 'STAGE VISUALIZER' });
      const [visual, setVisual] = useState({ trussColor: '#94a3b8', screenBg: 'rgba(23, 37, 84, 0.75)', screenBorder: 'rgba(59, 130, 246, 0.8)', showDim: true, showGrid: true, notes: '1. 本結構建議搭設於平整堅實地面。\n2. 帆布若遇6級以上強風建議卸下以防傾覆。\n3. 配電與燈光音響控制需符合戶外防雨標準。' });
      const [view, setView] = useState({ zoom: 1.0, panX: 0, panY: 0 }); // 已移除 3D 旋轉屬性
      const [prices, setPrices] = useState({ truss2m: 1200, truss1m: 800, corner: 1500, base: 1000, deck: 1600, step: 2500 });
      
      // 拖曳狀態 useRef 避免 re-render
      const dragRef = useRef({ isDragging: false, startX: 0, startY: 0, target: null });
      const screenRectRef = useRef(null);

      // 計算 BOM (物料清單)
      const bom = useMemo(() => {
        const beamL = dim.w - 2 * dim.trussW;
        const colL = dim.h;
        const getPieces = (l) => ({ p2: Math.floor(l / 2), p1: Math.ceil(l % 2) });
        
        const leftCol = getPieces(colL);
        const rightCol = getPieces(colL);
        const mainBeam = getPieces(beamL);
        
        const c2m = leftCol.p2 + rightCol.p2 + mainBeam.p2;
        const c1m = leftCol.p1 + rightCol.p1 + mainBeam.p1;
        const cCorners = 2;
        const cBases = 2;
        
        let cDecks = 0, cSteps = 0;
        if (type === 'stage') {
          cDecks = Math.ceil((dim.w * dim.d) / 2);
          cSteps = dim.steps ? (dim.deckH >= 1.2 ? 2 : 1) : 0;
        } else {
          cDecks = Math.max(2, Math.round(dim.w / 2) + 1); // 防風斜撐
        }
        
        const total = (c2m * prices.truss2m) + (c1m * prices.truss1m) + (cCorners * prices.corner) + (cBases * prices.base) + (cDecks * prices.deck) + (cSteps * prices.step);
        let hrs = ((c2m + c1m) * 0.22) + (cCorners + cBases) * 0.15 + 1.0;
        if (type === 'stage') hrs += (cDecks * 0.09) + (cSteps * 0.4);
        else hrs += (cDecks * 0.15);
        
        return { c2m, c1m, cCorners, cBases, cDecks, cSteps, total, hrs };
      }, [dim, type, prices]);

      // 畫布渲染核心
      const renderScene = useCallback((ctx, w, h, isExport = false) => {
        // 背景清理
        ctx.clearRect(0, 0, w, h);
        if (isExport) {
          ctx.fillStyle = '#ffffff';
        } else {
          ctx.fillStyle = isDark ? '#15151A' : '#F6F8F9';
        }
        ctx.fillRect(0, 0, w, h);

        // 主題定義 (強制白底黑線匯出 或 跟隨系統深淺色)
        const t = {
          grid: isExport ? 'transparent' : (isDark ? 'rgba(30, 41, 59, 0.4)' : 'rgba(226, 232, 240, 0.8)'),
          ground: isExport ? '#000000' : (isDark ? '#334155' : '#cbd5e1'),
          truss: isExport ? '#000000' : visual.trussColor,
          brace: isExport ? 'rgba(0,0,0,0.5)' : adjustHexOpacity(visual.trussColor, 0.6),
          deckTop: isExport ? '#ffffff' : (isDark ? '#1e293b' : '#f1f5f9'),
          deckBorder: isExport ? '#000000' : (isDark ? '#475569' : '#94a3b8'),
          dimCol: isExport ? '#000000' : '#4f46e5', 
          dimLine: isExport ? 'rgba(0,0,0,0.6)' : 'rgba(79, 70, 229, 0.4)'
        };

        const padding = isExport ? 150 : 60;
        const totalW = dim.w + 3.0; const totalH = dim.h + 2.5;
        
        // 匯出模式則重設縮放與偏移，確保置中；否則套用使用者的視角設定
        const currentZoom = isExport ? 1.0 : view.zoom;
        const currentPanX = isExport ? 0 : view.panX;
        const currentPanY = isExport ? 0 : view.panY;

        const scale = Math.min((w - padding*2)/totalW, (h - padding*2)/totalH) * currentZoom;
        const oX = w/2 + currentPanX;
        const oY = h - padding - (isExport ? 60 : 20) + currentPanY;
        
        const toX = m => oX + m * scale;
        const toY = m => oY - m * scale;
        const toS = m => m * scale;

        // 網格與地面
        if (visual.showGrid && !isExport) {
           ctx.strokeStyle = t.grid; ctx.lineWidth = 1;
           for(let ix = oX % scale; ix < w; ix += scale) { ctx.beginPath(); ctx.moveTo(ix,0); ctx.lineTo(ix,h); ctx.stroke(); }
           for(let iy = oY % scale; iy < h; iy += scale) { ctx.beginPath(); ctx.moveTo(0,iy); ctx.lineTo(w,iy); ctx.stroke(); }
        }
        ctx.strokeStyle = t.ground; ctx.lineWidth = isExport ? 3 : 2;
        ctx.beginPath(); ctx.moveTo(isExport ? padding/2 : 0, oY); ctx.lineTo(isExport ? w-padding/2 : w, oY); ctx.stroke();

        // 媒體背板
        if (media.type !== 'none') {
          const sx = toX(-media.w/2), sy = toY(media.y + media.h), sw = toS(media.w), sh = toS(media.h);
          if (!isExport) screenRectRef.current = {x: sx, y: sy, w: sw, h: sh};
          
          ctx.save();
          if(!isExport) { ctx.shadowColor = visual.screenBorder; ctx.shadowBlur = 10; }
          ctx.fillStyle = isExport ? '#ffffff' : visual.screenBg;
          ctx.fillRect(sx, sy, sw, sh);
          ctx.restore();
          
          ctx.strokeStyle = isExport ? '#000000' : visual.screenBorder; ctx.lineWidth = isExport ? 3 : 2;
          ctx.strokeRect(sx, sy, sw, sh);

          ctx.fillStyle = isExport ? '#000000' : '#ffffff';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = `bold ${Math.max(14, toS(0.6))}px sans-serif`;
          ctx.fillText(media.text, sx + sw/2, sy + sh/2 - toS(0.1));
          ctx.fillStyle = isExport ? '#333333' : 'rgba(255,255,255,0.7)';
          ctx.font = `${Math.max(10, toS(0.3))}px sans-serif`;
          ctx.fillText(media.subtext, sx + sw/2, sy + sh/2 + toS(0.3));

          // 綁繩
          ctx.strokeStyle = isExport ? '#000' : (isDark ? '#64748b' : '#94a3b8'); ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(toX(-media.w/2 + 0.5), sy); ctx.lineTo(toX(-media.w/2 + 0.5), toY(dim.h - dim.trussW));
          ctx.moveTo(toX(media.w/2 - 0.5), sy); ctx.lineTo(toX(media.w/2 - 0.5), toY(dim.h - dim.trussW));
          ctx.stroke();
        } else { if(!isExport) screenRectRef.current = null; }

        // 地台
        const dx = toX(-dim.w/2), dy = toY(dim.deckH), dw = toS(dim.w), dh = toS(dim.deckH);
        ctx.fillStyle = t.deckTop; ctx.fillRect(dx, dy, dw, dh);
        ctx.strokeStyle = t.deckBorder; ctx.lineWidth = isExport ? 3 : 2; ctx.strokeRect(dx, dy, dw, dh);
        
        if (type === 'stage') {
          ctx.beginPath(); ctx.moveTo(toX(-dim.w/2 + 1.5), dy); ctx.lineTo(toX(-dim.w/2 + 1.5), dy + dh); ctx.stroke();
          if (dim.steps) {
            const stW = toS(1.6), stH = dh/3, stX = toX(0) - stW/2;
            ctx.fillStyle = isExport ? '#ffffff' : (isDark ? '#0f172a' : '#f1f5f9');
            for(let i=0; i<3; i++) {
              const off = i * (stW/6), cw = stW - off*2, cy = oY - stH*(i+1);
              ctx.fillRect(stX + off, cy, cw, stH); ctx.strokeRect(stX + off, cy, cw, stH);
            }
          }
        }

        // 桁架 Truss 繪製
        const draw2DTruss = (tx, ty, tw, th, dir) => {
          ctx.strokeStyle = t.truss; ctx.lineWidth = isExport ? 2.5 : 1.5;
          ctx.strokeRect(tx, ty, tw, th);
          const segSize = Math.max(tw, th) * (0.8);
          const num = Math.max(2, Math.round((dir==='v'?th:tw)/segSize));
          const step = (dir==='v'?th:tw)/num;
          ctx.strokeStyle = t.brace; ctx.lineWidth = isExport ? 1.5 : 1;
          ctx.beginPath();
          for(let i=0; i<num; i++) {
            if (dir==='v') {
              ctx.moveTo(tx, ty+i*step); ctx.lineTo(tx+tw, ty+(i+1)*step);
              ctx.moveTo(tx+tw, ty+i*step); ctx.lineTo(tx, ty+(i+1)*step);
            } else {
              ctx.moveTo(tx+i*step, ty); ctx.lineTo(tx+(i+1)*step, ty+th);
              ctx.moveTo(tx+(i+1)*step, ty); ctx.lineTo(tx+i*step, ty+th);
            }
          }
          ctx.stroke();
        };

        const colX1 = -dim.w/2 + dim.trussW/2, colX2 = dim.w/2 - dim.trussW/2;
        draw2DTruss(toX(colX1 - dim.trussW/2), toY(dim.h), toS(dim.trussW), toS(dim.h), 'v');
        draw2DTruss(toX(colX2 - dim.trussW/2), toY(dim.h), toS(dim.trussW), toS(dim.h), 'v');
        draw2DTruss(toX(-dim.w/2), toY(dim.h), toS(dim.w), toS(dim.trussW), 'h');

        // 底座
        const bw = toS(dim.trussW*1.8), bh = toS(0.15);
        ctx.fillStyle = isExport ? '#ffffff' : (isDark ? '#334155' : '#cbd5e1');
        ctx.fillRect(toX(colX1) - bw/2, oY - bh, bw, bh); ctx.strokeRect(toX(colX1) - bw/2, oY - bh, bw, bh);
        ctx.fillRect(toX(colX2) - bw/2, oY - bh, bw, bh); ctx.strokeRect(toX(colX2) - bw/2, oY - bh, bw, bh);

        // 尺寸標註
        if (visual.showDim || isExport) {
          ctx.fillStyle = t.dimCol; ctx.strokeStyle = t.dimCol; ctx.font = `bold ${isExport?20:12}px sans-serif`;
          const drawDim = (x1, y1, x2, y2, off, txt, isV) => {
            ctx.beginPath(); ctx.strokeStyle = t.dimLine; ctx.lineWidth = isExport ? 2 : 1;
            if(!isV) { ctx.moveTo(x1,y1); ctx.lineTo(x1, y1-off); ctx.moveTo(x2,y2); ctx.lineTo(x2,y2-off); ctx.stroke();
              ctx.beginPath(); ctx.strokeStyle=t.dimCol; ctx.moveTo(x1,y1-off); ctx.lineTo(x2,y2-off); ctx.stroke();
              ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(txt, (x1+x2)/2, y1-off-6);
            } else {
              ctx.moveTo(x1,y1); ctx.lineTo(x1+off, y1); ctx.moveTo(x2,y2); ctx.lineTo(x2+off,y2); ctx.stroke();
              ctx.beginPath(); ctx.strokeStyle=t.dimCol; ctx.moveTo(x1+off,y1); ctx.lineTo(x2+off,y2); ctx.stroke();
              ctx.save(); ctx.translate(x1+off+(off>0?20:-10), (y1+y2)/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillText(txt,0,0); ctx.restore();
            }
          };
          drawDim(toX(-dim.w/2), toY(dim.h+0.8), toX(dim.w/2), toY(dim.h+0.8), isExport?40:20, `${dim.w}m (寬)`, false);
          drawDim(toX(-dim.w/2-0.8), toY(0), toX(-dim.w/2-0.8), toY(dim.h), isExport?-40:-20, `${dim.h}m (高)`, true);
        }

      }, [dim, media, visual, view, type, isDark]);

      // 監聽畫布外層容器的尺寸變化以解決跑版問題
      useEffect(() => {
        const canvas = canvasRef.current;
        const container = containerRef.current;
        if (!canvas || !container) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        const updateSize = () => {
          const w = container.clientWidth;
          const h = container.clientHeight;
          if (w === 0 || h === 0) return;
          
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + 'px';
          canvas.style.height = h + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0); 
          
          renderScene(ctx, w, h, false);
        };

        updateSize();
        const resizeObserver = new ResizeObserver(() => updateSize());
        resizeObserver.observe(container);

        return () => resizeObserver.disconnect();
      }, [renderScene, mobileTab]);

      // 滑鼠與觸控拖曳邏輯
      const handleStart = (clientX, clientY) => {
        const rect = canvasRef.current.getBoundingClientRect();
        dragRef.current = { isDragging: true, startX: clientX - rect.left, startY: clientY - rect.top, target: null };
        if (media.type !== 'none' && screenRectRef.current) {
          const { x, y, w, h } = screenRectRef.current;
          if (dragRef.current.startX >= x && dragRef.current.startX <= x + w && dragRef.current.startY >= y && dragRef.current.startY <= y + h) {
            dragRef.current.target = 'screen'; return;
          }
        }
        dragRef.current.target = 'pan';
      };
      
      const handleMove = (clientX, clientY) => {
        if (!dragRef.current.isDragging) return;
        const rect = canvasRef.current.getBoundingClientRect();
        const mx = clientX - rect.left, my = clientY - rect.top;
        const dx = mx - dragRef.current.startX, dy = my - dragRef.current.startY;
        
        if (dragRef.current.target === 'screen') {
           const scale = Math.min((rect.width - 120)/(dim.w+3), (rect.height - 120)/(dim.h+2.5)) * view.zoom;
           let newY = media.y - dy / scale;
           newY = Math.max(type === 'stage' ? dim.deckH : 0.1, Math.min(dim.h - media.h - dim.trussW, newY));
           setMedia(m => ({...m, y: newY}));
        } else if (dragRef.current.target === 'pan') {
           setView(v => ({...v, panX: v.panX + dx, panY: v.panY + dy}));
        }
        dragRef.current.startX = mx; dragRef.current.startY = my;
      };

      const handleEnd = () => dragRef.current.isDragging = false;

      // 匯出純粹白底黑線的工程藍圖
      const exportBlueprint = () => {
        const expCanvas = document.createElement('canvas');
        expCanvas.width = 1920; 
        expCanvas.height = 1080;
        const ctx = expCanvas.getContext('2d');
        
        ctx.fillStyle = '#ffffff'; 
        ctx.fillRect(0,0,1920,1080);
        
        ctx.save();
        ctx.translate(0, -120); 
        renderScene(ctx, 1920, 1080, true);
        ctx.restore();

        // 繪製底部資訊框
        ctx.strokeStyle = '#000000'; ctx.lineWidth = 3; 
        ctx.strokeRect(40, 40, 1840, 1000);
        ctx.strokeRect(40, 760, 1840, 280);
        ctx.beginPath(); ctx.moveTo(600, 760); ctx.lineTo(600, 1040); ctx.moveTo(1160, 760); ctx.lineTo(1160, 1040); ctx.stroke();

        ctx.fillStyle = '#000000'; ctx.font = "bold 32px 'Noto Sans TC'";
        ctx.fillText(type === 'stage' ? '專業舞台系統結構施工藍圖' : '視覺宣傳打卡牆結構施工藍圖', 70, 810);
        ctx.font = "bold 20px 'Noto Sans TC'"; ctx.fillStyle = '#333333';
        ctx.fillText("設計單位：場地與舞台規劃組", 70, 870);
        ctx.fillText("軟體版本：EventScout Blueprint", 70, 910);
        
        ctx.fillStyle = '#000000'; ctx.font = "bold 22px 'Noto Sans TC'";
        ctx.fillText("📊 結構與設備規格明細：", 630, 810);
        ctx.font = "18px 'Noto Sans TC'"; ctx.fillStyle = '#111111';
        ctx.fillText(`• 結構：寬度 ${dim.w.toFixed(2)}m x 高度 ${dim.h.toFixed(2)}m x 深度 ${dim.d.toFixed(2)}m`, 630, 860);
        ctx.fillText(`• 視覺：${media.type==='led'?'LED 螢幕':'帆布輸出'} (寬 ${media.w.toFixed(2)}m x 高 ${media.h.toFixed(2)}m, 離地 ${media.y.toFixed(2)}m)`, 630, 900);
        ctx.fillText(`• 舞台地台高度：${dim.deckH.toFixed(2)}m`, 630, 940);

        ctx.fillStyle = '#000000'; ctx.font = "bold 22px 'Noto Sans TC'";
        ctx.fillText("📝 現場施工備註與安全指引規範：", 1190, 810);
        ctx.font = "18px 'Noto Sans TC'"; ctx.fillStyle = '#111111';
        const lines = visual.notes.split('\n');
        lines.forEach((l, i) => ctx.fillText(l, 1190, 860 + i * 30));

        ctx.fillStyle = '#666666'; ctx.font = "14px 'JetBrains Mono'";
        ctx.fillText(`DATE: ${new Date().toLocaleDateString()} | VIEW: 2D FRONT VIEW | SCALE: FIT`, 1550, 1020);

        const dataURL = expCanvas.toDataURL('image/png');
        const link = document.createElement('a'); link.download = `專業工程藍圖_${Date.now()}.png`; link.href = dataURL; link.click();
      };

      const resetView = () => {
        setView({ zoom: 1.0, panX: 0, panY: 0 });
      };

      return (

            <div>
              <h2 className="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2"><Icon name="box" className="text-indigo-600 dark:text-indigo-400" /> Truss 結構圖繪製</h2>
            </div>
            <button onClick={exportBlueprint} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm transition w-full sm:w-auto justify-center"><Icon name="download" /> 匯出白底黑線藍圖</button>
          </div>

          {/* 行動版分頁列 */}
          <div className="lg:hidden bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-4 py-2 flex gap-1 shrink-0">
            <button onClick={() => setMobileTab('settings')} className={`flex-1 py-2 rounded-md text-xs font-bold transition-all border ${mobileTab==='settings'?'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 border-indigo-200 dark:border-indigo-500/30':'border-transparent text-slate-500 dark:text-slate-400'}`}>參數設定</button>
            <button onClick={() => setMobileTab('canvas')} className={`flex-1 py-2 rounded-md text-xs font-bold transition-all border ${mobileTab==='canvas'?'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 border-indigo-200 dark:border-indigo-500/30':'border-transparent text-slate-500 dark:text-slate-400'}`}>畫布預覽</button>
          </div>

          <div className="flex flex-1 min-h-0 overflow-hidden">
            {/* 左側參數面板 */}
            <div className={`w-full lg:w-[320px] bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex-col shrink-0 z-10 ${mobileTab === 'settings' ? 'flex' : 'hidden lg:flex'}`}>
              <div className="flex border-b border-slate-200 dark:border-slate-800 shrink-0">
                <button onClick={() => setSettingTab('dim')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 border-b-2 ${settingTab==='dim'?'border-indigo-600 text-indigo-700 dark:text-indigo-400 bg-slate-50 dark:bg-slate-800/50':'border-transparent text-slate-500'}`}><Icon name="sliders" />尺寸</button>
                <button onClick={() => setSettingTab('style')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 border-b-2 ${settingTab==='style'?'border-indigo-600 text-indigo-700 dark:text-indigo-400 bg-slate-50 dark:bg-slate-800/50':'border-transparent text-slate-500'}`}><Icon name="palette" />視覺</button>
                <button onClick={() => setSettingTab('bom')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 border-b-2 ${settingTab==='bom'?'border-indigo-600 text-indigo-700 dark:text-indigo-400 bg-slate-50 dark:bg-slate-800/50':'border-transparent text-slate-500'}`}><Icon name="calculator" />預算</button>
              </div>

              <div className="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
                {settingTab === 'dim' && (
                  <div className="space-y-6 animate-in fade-in">
                    <div>
                      <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">結構類型</label>
                      <div className="flex gap-2">
                        <button onClick={() => { setType('stage'); setDim(d=>({...d, deckH:1.2})); }} className={`flex-1 py-2 rounded-md text-xs font-bold border transition ${type==='stage'?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-[#15151A] text-slate-600 dark:text-slate-300 border-slate-300 dark:border-slate-700'}`}>舞台系統</button>
                        <button onClick={() => { setType('photowall'); setDim(d=>({...d, deckH:0.1})); setMedia(m=>({...m, y: Math.max(0.1, m.y)})); }} className={`flex-1 py-2 rounded-md text-xs font-bold border transition ${type==='photowall'?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-[#15151A] text-slate-600 dark:text-slate-300 border-slate-300 dark:border-slate-700'}`}>視覺牆系統</button>
                      </div>
                    </div>
                    <div className="space-y-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                      <InputGroup label="總寬度 (W)" type="range" min="5" max="24" step="0.5" value={dim.w} onChange={e=>setDim({...dim, w: parseFloat(e.target.value)})} />
                      <InputGroup label="總高度 (H)" type="range" min="4" max="14" step="0.5" value={dim.h} onChange={e=>setDim({...dim, h: parseFloat(e.target.value)})} />
                      {type === 'stage' && <InputGroup label="總深度 (D)" type="range" min="3" max="12" step="0.5" value={dim.d} onChange={e=>setDim({...dim, d: parseFloat(e.target.value)})} />}
                    </div>
                    {type === 'stage' && (
                      <div className="space-y-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                        <InputGroup label="舞台地台高度 (Sh)" type="range" min="0.4" max="2.4" step="0.1" value={dim.deckH} onChange={e=>setDim({...dim, deckH: parseFloat(e.target.value)})} />
                        <label className="flex items-center gap-2 text-xs font-bold text-slate-600 dark:text-slate-400 cursor-pointer"><input type="checkbox" checked={dim.steps} onChange={e=>setDim({...dim, steps: e.target.checked})} className="rounded text-indigo-600 focus:ring-indigo-500" /> 配置安全登台階梯</label>
                      </div>

                    <div className="space-y-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                      <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">視覺媒體配置</label>
                      <select value={media.type} onChange={e=>setMedia({...media, type: e.target.value})} className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none mb-4">

                      {media.type !== 'none' && (
                        <>
                          <InputGroup label="畫面寬度 (Sw)" type="range" min="3" max={Math.max(3, dim.w-1)} step="0.5" value={media.w} onChange={e=>setMedia({...media, w: parseFloat(e.target.value)})} />
                          <InputGroup label="畫面高度 (Sh)" type="range" min="2" max={Math.max(2, dim.h-dim.deckH-0.8)} step="0.5" value={media.h} onChange={e=>setMedia({...media, h: parseFloat(e.target.value)})} />
                          <InputGroup label="畫面離地高度 (Sy)" type="range" min={type==='stage'?dim.deckH:0.1} max={dim.h-media.h-dim.trussW} step="0.1" value={media.y} onChange={e=>setMedia({...media, y: parseFloat(e.target.value)})} />
                        </>
                      )}
                    </div>
                  </div>
                )}
                {settingTab === 'style' && (
                  <div className="space-y-6 animate-in fade-in">
                    <div>
                      <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">桁架顏色外觀</label>
                      <div className="flex gap-2">

                          <button key={c} onClick={()=>setVisual({...visual, trussColor: c})} className={`w-8 h-8 rounded-md transition-transform ${visual.trussColor===c?'ring-2 ring-indigo-500 ring-offset-2 dark:ring-offset-[#202024] scale-110':'border border-slate-300 dark:border-slate-600'}`} style={{backgroundColor: c}}></button>
                        ))}
                      </div>
                    </div>
                    {media.type !== 'none' && (
                      <div>
                        <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">螢幕背板氛圍色</label>
                        <div className="flex gap-2">
                          <button onClick={()=>setVisual({...visual, screenBg:'rgba(23, 37, 84, 0.75)', screenBorder:'rgba(59, 130, 246, 0.8)'})} className={`w-8 h-8 rounded-md border border-blue-500 bg-blue-900 transition-transform ${visual.screenBg.includes('23')?'ring-2 ring-indigo-500 ring-offset-2 dark:ring-offset-[#202024] scale-110':''}`}></button>
                          <button onClick={()=>setVisual({...visual, screenBg:'rgba(46, 16, 101, 0.75)', screenBorder:'rgba(139, 92, 246, 0.8)'})} className={`w-8 h-8 rounded-md border border-purple-500 bg-purple-900 transition-transform ${visual.screenBg.includes('46')?'ring-2 ring-indigo-500 ring-offset-2 dark:ring-offset-[#202024] scale-110':''}`}></button>
                          <button onClick={()=>setVisual({...visual, screenBg:'rgba(15, 23, 42, 0.9)', screenBorder:'rgba(71, 85, 105, 0.8)'})} className={`w-8 h-8 rounded-md border border-slate-500 bg-slate-900 transition-transform ${visual.screenBg.includes('15')?'ring-2 ring-indigo-500 ring-offset-2 dark:ring-offset-[#202024] scale-110':''}`}></button>
                        </div>
                      </div>
                    )}
                    <div className="space-y-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                       <label className="flex items-center gap-2 text-xs font-bold text-slate-600 dark:text-slate-400 cursor-pointer"><input type="checkbox" checked={visual.showGrid} onChange={e=>setVisual({...visual, showGrid: e.target.checked})} className="rounded text-indigo-600 focus:ring-indigo-500" /> 顯示空間網格</label>
                       <label className="flex items-center gap-2 text-xs font-bold text-slate-600 dark:text-slate-400 cursor-pointer"><input type="checkbox" checked={visual.showDim} onChange={e=>setVisual({...visual, showDim: e.target.checked})} className="rounded text-indigo-600 focus:ring-indigo-500" /> 顯示尺寸標註</label>
                    </div>
                    {media.type !== 'none' && (
                      <div className="space-y-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                        <InputGroup label="螢幕大標題" value={media.text} onChange={e=>setMedia({...media, text: e.target.value})} />
                        <InputGroup label="副標題" value={media.subtext} onChange={e=>setMedia({...media, subtext: e.target.value})} />
                      </div>
                    )}
                    <div className="pt-4 border-t border-slate-100 dark:border-slate-800">
                      <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1.5">工程施工備註</label>
                      <textarea rows="4" value={visual.notes} onChange={e=>setVisual({...visual, notes: e.target.value})} className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 outline-none resize-none font-mono"></textarea>
                    </div>
                  </div>
                )}
                {settingTab === 'bom' && (
                  <div className="space-y-4 animate-in fade-in">
                    <div className="p-4 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900/50 rounded-lg">
                      <h4 className="text-xs font-bold text-amber-700 dark:text-amber-500 mb-2">預估硬體預算</h4>
                      <p className="text-xl font-mono font-bold text-amber-600 dark:text-amber-400">NT$ {bom.total.toLocaleString()}</p>
                      <p className="text-[10px] text-amber-600/70 dark:text-amber-500/70 mt-1">預估工時: {bom.hrs.toFixed(1)} hr</p>
                    </div>
                    <div className="space-y-2">
                      {[
                        {n: '2米 直型桁架', q: bom.c2m, u: '支'}, {n: '1米 直型桁架', q: bom.c1m, u: '支'},
                        {n: '六向轉角箱', q: bom.cCorners, u: '個'}, {n: '配重底座', q: bom.cBases, u: '個'},
                        {n: type==='stage'?'舞台防滑板 (1x2m)':'A字防風後斜撐', q: bom.cDecks, u: type==='stage'?'片':'組'},
                        {n: '安全上台階梯', q: bom.cSteps, u: '組', show: type==='stage'}
                      ].filter(i=>i.show!==false).map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center p-2.5 bg-slate-50 dark:bg-[#15151A] border border-slate-200 dark:border-slate-800 rounded-md text-xs">
                          <span className="font-bold text-slate-700 dark:text-slate-300">{item.n}</span>
                          <span className="font-mono text-indigo-600 dark:text-indigo-400 font-bold">{item.q} {item.u}</span>
                        </div>
                      ))}
                    </div>
                    <p className="text-[10px] text-slate-500 leading-relaxed italic mt-4">*此清單為依據結構自動估算，實際執行請依現場負載與廠商報價為主。</p>
                  </div>
                )}
              </div>
            </div>

            {/* 右側 畫布區域：重寫了父層容器，解決跑版問題 */}
            <div className={`flex-1 relative bg-slate-100 dark:bg-[#0f172a] overflow-hidden ${mobileTab === 'canvas' ? 'block' : 'hidden lg:block'}`} ref={containerRef}>
              
              <div className="absolute top-4 left-4 right-4 flex justify-between items-start z-10 pointer-events-none">
                <div className="bg-white/90 dark:bg-slate-900/90 backdrop-blur border border-slate-200 dark:border-slate-700 rounded-lg p-1 flex gap-1 pointer-events-auto shadow-sm">
                  <button onClick={resetView} className="px-3 py-1.5 rounded-md text-xs font-bold transition flex items-center gap-1.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">
                    <Icon name="focus" /> 置中重設視角
                  </button>
                </div>
                <div className="text-[10px] text-slate-500 bg-white/80 dark:bg-slate-900/80 px-2 py-1 rounded border border-slate-200 dark:border-slate-800 backdrop-blur pointer-events-auto">
                  可使用滑鼠/觸控拖曳平移與滾輪縮放
                </div>
              </div>

              {/* Canvas 現在使用 absolute 完美填充剩餘空間 */}
              <canvas 
                ref={canvasRef} 
                onMouseDown={(e)=>handleStart(e.clientX, e.clientY)}
                onMouseMove={(e)=>handleMove(e.clientX, e.clientY)}
                onMouseUp={handleEnd} onMouseLeave={handleEnd}
                onTouchStart={(e)=>{ e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }}
                onTouchMove={(e)=>{ e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }}
                onTouchEnd={handleEnd}
                onWheel={(e)=>{ e.preventDefault(); setView(v => ({...v, zoom: Math.max(0.3, Math.min(3, v.zoom * (e.deltaY>0?0.9:1.1)))})); }}
                className={`absolute inset-0 w-full h-full cursor-grab active:cursor-grabbing block touch-none`}
              ></canvas>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    function RootApp() {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      
      return (
        <AppLayout activePage="truss" theme={theme} toggleTheme={toggleTheme}>
          <TrussApp theme={theme} />
        </AppLayout>
      );
    }
    root.render(<RootApp />);
  </script>
</body>
</html>
